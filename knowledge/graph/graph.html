    "markdown": "---\ntitle: \"Insurance Premium Prediction via Gradient Tree-Boosted Tweedie Compound Poisson Models\"\ntype: source\ntags: [method, TDboost, tweedie, boosting, insurance]\ndate: 2016-04-22\nsource_file: knowledge/raw/papers/yang-2016-tdboost.md\n---\n\n## Summary\nYang, Qian, and Zou replace the linear log-mean structure of the Tweedie GLM with a flexible boosted-tree ensemble. The TDboost algorithm is forward-stagewise gradient boosting under the Tweedie negative log-likelihood. ρ (variance power) and φ (dispersion) are estimated by profile likelihood. The R package `TDboost` includes partial-dependence plots so the model is not a complete black box.\n\n## Canonical API\n```R\nlibrary(TDboost)\n\n# Profile-likelihood for rho (variance power) is INSIDE the package as\n# TDboost(distribution=list(name=\"EDM\", alpha=rho), ...) — alpha here means rho\nfit <- TDboost(\n  formula      = CLM_AMT ~ AGE + BLUEBOOK + MVR_PTS + AREA + ...,\n  data         = train,\n  distribution = list(name = \"EDM\", alpha = 1.5),   # alpha IS the variance power\n  n.trees      = 3000,\n  interaction.depth = 3,\n  shrinkage    = 0.005,                              # paper-recommended\n  bag.fraction = 0.5,\n  cv.folds     = 5,\n  keep.data    = FALSE\n)\n\n# Pick best iteration from CV\nbest_iter <- TDboost.perf(fit, method = \"cv\", plot.it = FALSE)\ny_hat     <- predict(fit, newdata = test, n.trees = best_iter, type = \"response\")\n\n# Interpretation\nrelative.influence(fit, n.trees = best_iter)         # variable importance\nplot(fit, i.var = \"AGE\", n.trees = best_iter)        # partial dependence\n```\n\nEnd-to-end: `[[examples/yang-2016-tdboost]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `distribution$alpha` | variance power ρ, in (1, 2) | 1.5 | profile via inner loop | {1.3, 1.5, 1.7} |\n| `n.trees` | boosting rounds | 100 | 3000+ with `shrinkage = 0.005`; pick via `TDboost.perf` | 1000–5000 |\n| `shrinkage` (ν) | learning rate | 0.001 | **0.005** (paper) | 0.001, 0.005, 0.01 |\n| `interaction.depth` (L) | tree depth | 1 | 3–5 for interactions | {1, 3, 5} |\n| `bag.fraction` | row subsample per tree | 0.5 | 0.5 | 0.5, 0.7 |\n| `cv.folds` | CV for picking `n.trees` | 0 (off) | 5 | 5, 10 |\n\n## Argument Quirks\n- The argument is **`distribution = list(name = \"EDM\", alpha = ρ)`** — `alpha` here is the *variance power*, NOT the elastic net mixing or a learning rate. Confusingly overloaded name; the benchmark scripts in `archive/auto-insurance-bench-*` get this right.\n- `n.trees` is the *maximum* number of trees fit; the optimal number must be selected via `TDboost.perf(..., method = \"cv\")`. Predicting with the full `n.trees` overfits.\n- `keep.data = FALSE` matters for memory if the dataset is wide. Setting `TRUE` (the default) caches the training data inside the fit object.\n- Exposure: TDboost does **not** support a `weights` or `offset` argument that maps cleanly to Tweedie exposure. The conventional workaround is modeling `CLM_AMT / exposure` and weighting by `exposure`, but the weighting must be passed as `w` — check vignette before relying.\n\n## Failure Modes\n- **Overfitting with too many trees.** Always use `TDboost.perf(..., method = \"cv\")` to select `best_iter`. Predicting at `n.trees = fit$n.trees` (no selection) is a common mistake.\n- Convergence stalls for very sparse zero-inflated data (>98% zeros) — increase `bag.fraction` to 0.7 or use stratified sampling.\n- Categorical variables with many rare levels cause unstable splits — bucket levels with <1% frequency before fitting.\n- `predict` with `type = \"response\"` requires a fitted distribution; if `keep.data = FALSE` AND the original data frame is no longer available, you must recreate the distribution object.\n\n## Code Example\nSee `[[examples/yang-2016-tdboost]]`.\n\n## Domain Pitfalls\n- Partial-dependence plots for actuarial pricing should be checked for monotonicity violations (e.g., young drivers being cheaper than middle-aged). The paper notes \"risk does not monotonically decrease as age increases\" — fine for prediction, but final rates often need monotone post-processing.\n- Boosting absorbs zero-inflation naturally via the EDM distribution. Do NOT filter zero-claim rows.\n- TDboost is nonparametric — no built-in handling for unseen factor levels in test. Predictions for new levels fall back to the marginal mean.\n\n## Connections\n- [[GradientTreeBoosting]] — core algorithm\n- [[TweedieDistribution]] — response distribution\n- [[ProfileLikelihood]] — for ρ, φ\n- [[PartialDependencePlots]] — interpretation\n- [[YiYang]], [[WeiQian]], [[HuiZou]]\n\n## Contradictions\nNone with existing wiki content.\n",
    "preview": "## Summary Yang, Qian, and Zou replace the linear log-mean structure of the Tweedie GLM with a flexible boosted-tree ensemble. The TDboost algorithm is forward-stagewise gradient boosting under the Tweedie negative log-l",

    "markdown": "---\ntitle: \"Risk Based Scores and the Gini Index\"\ntype: source\ntags: [method, cplm, gini, evaluation, insurance]\ndate: 2011-04-27\nsource_file: knowledge/raw/papers/frees-meyers-cummings-2011-gini.md\n---\n\n## Summary\nFrees, Meyers, and Cummings extend the classic Lorenz curve / Gini index to insurance pricing by sorting losses and premiums by a *relativity* `R = S(x) / P(x)` (alternative score divided by base premium). The resulting *ordered* Lorenz curve quantifies how much loss separation a candidate score `S` achieves beyond a base premium `P`. The associated Gini index is approximately twice the average expected profit from adopting `S`. Useful precisely because it can be computed against any base premium — including a constant — and so handles the zero-inflation that breaks classical metrics.\n\n## Canonical API\n```R\nlibrary(cplm)\n\n# y_true:    observed losses (vector)\n# y_score:   candidate score under evaluation\n# y_base:    baseline / reference premium (often a constant or simpler model)\ngini_result <- cplm::gini(\n  loss     = y_true,\n  score    = y_score,\n  baseline = y_base       # if comparing two models, pass the older model here\n)\n\ngini_result$gini          # the index in percent\ngini_result$se            # asymptotic standard error\nplot(gini_result)         # the ordered Lorenz curve\n```\n\nFor a *minimax* comparison across many candidate scores, loop over all (base, score) pairs and report the table — the paper's Section 3 example.\n\nEnd-to-end: `[[examples/frees-meyers-cummings-2011-gini]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `baseline` | reference premium | — | constant premium for first pass; competing model for second pass | both |\n| sort direction | by relativity ascending | yes | yes | — |\n\nThe metric itself has no hyperparameters — it's deterministic given inputs.\n\n## Argument Quirks\n- **`gini(loss, score, baseline)` — NOT `(y_true, y_pred)`.** The relativity is computed internally as `score / baseline`. Passing the candidate score where baseline is expected silently produces a number that looks plausible but means nothing.\n- For a single-model evaluation against a constant baseline, pass `baseline = rep(mean(loss), length(loss))` or `baseline = 1`. The benchmark scripts in `archive/auto-insurance-bench-*` define `gini_insurance(y_true, y_pred)` which collapses to score-vs-constant — this is a valid use case but should be labeled as such.\n- Ties in relativity are broken by score order; for very discrete predictions (e.g., rounded), break ties before passing in.\n- Asymptotic SE assumes ≥ ~1000 observations; under that, bootstrap.\n\n## Failure Modes\n- **Gini > 0.6 on `AutoClaim` should trigger a leakage audit.** Published Gini for Tweedie/penalized methods on this dataset is in the 0.30–0.45 range; the `medium-01` benchmark hit 0.69, almost certainly indicating a data-prep bug, not a real model improvement.\n- Gini < 0.05 with SE near the point estimate → score is no better than baseline; do not adopt.\n- A candidate score that achieves high Gini against one baseline but negative against another is *less* robust, not more — see the paper's minimax discussion.\n\n## Code Example\nSee `[[examples/frees-meyers-cummings-2011-gini]]`.\n\n## Domain Pitfalls\n- Gini is **rank-based**, not calibration-based. A model can have excellent Gini and still be miscalibrated (predicted mean ≠ observed mean). Always pair Gini with a calibration check — see [[CalibrationPlots]].\n- Adverse selection framing: if competitor adopts a refined score and you don't, your portfolio loses good risks. Ordered Lorenz quantifies *exactly* that exposure.\n- Single Gini number is not a hypothesis test — use the asymptotic SE to compare candidate scores statistically. Differences within 2 SEs are not actionable.\n\n## Connections\n- [[GiniIndex]] — concept\n- [[LorenzCurve]] — graphical companion\n- [[AdverseSelection]] — economic motivation\n- [[CalibrationPlots]] — complementary diagnostic\n- [[EdwardWFrees]], [[GlennMeyers]], [[ADavidCummings]]\n\n## Contradictions\nNone with existing wiki content.\n",

    "markdown": "---\ntitle: \"Fitting Tweedie's Compound Poisson Model to Insurance Claims Data: Dispersion Modelling\"\ntype: source\ntags: [method, statmod, tweedie, dglm, insurance]\ndate: 2002-01-01\nsource_file: knowledge/raw/papers/smyth-jorgensen-2002-tweedie-dispersion.md\n---\n\n## Summary\nSmyth and Jørgensen extend the Tweedie compound-Poisson GLM by fitting a *double* GLM that jointly models the mean **and** the dispersion. They observe that real claims data routinely violate the constant-dispersion assumption and that modeling dispersion via a second sub-GLM tightens tariff precision. The framework also handles the common case where only total cost is recorded (not claim counts). Demonstrated on the Swedish third-party auto portfolio.\n\n## Canonical API\nThe paper itself uses base R + custom code. The closest production equivalent today is `statmod::tweedie` plus `dglm::dglm`, or `cplm::cpglm` with formula-based dispersion modeling.\n\n```R\n# Single-mean Tweedie GLM (no dispersion model) — statmod\nlibrary(statmod)\nfit <- glm(CLM_AMT ~ ., data = train,\n           family = tweedie(var.power = 1.5, link.power = 0))\n\n# Double GLM (mean + dispersion) — dglm\nlibrary(dglm)\nfit_dglm <- dglm(formula  = CLM_AMT ~ AGE + BLUEBOOK + AREA,\n                 dformula = ~ AGE + AREA,                # dispersion submodel\n                 family   = tweedie(var.power = 1.5, link.power = 0),\n                 data     = train)\n```\n\nVerified end-to-end: `[[examples/smyth-jorgensen-2002-tweedie-dispersion]]` (marked `# UNVERIFIED` until run).\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `var.power` (p) | mean-variance link, `Var(Y)=φμ^p` | none — must specify | profile likelihood over (1, 2) | {1.3, 1.5, 1.7} or `tweedie.profile()` |\n| `link.power` | link function | 0 = log | 0 (log link) | 0 |\n| dispersion formula | covariates for log(φ) | `~1` (constant) | as many factors as affect spread | start with main effects only |\n\n## Argument Quirks\n- `statmod::tweedie(var.power=1.7, link.power=0)` — `link.power=0` means log link. Setting `link.power=1` (identity) is almost always wrong for claims.\n- `dglm` writes the dispersion submodel as a gamma GLM on unit deviances. Pre-condition: the response in the mean model must already have positive support (after the zero-mass via Tweedie).\n- REML for dispersion uses `method=\"reml\"` (paper's recommendation) — `method=\"ml\"` produces biased φ estimates when n_params grows with n.\n\n## Failure Modes\n- Convergence stalls when p is mis-specified — symptom is dispersion submodel coefficients exploding. Diagnose with `tweedie.profile()`.\n- If only total cost is observed (no claim counts), use the response = total cost per unit exposure and pass `weights = exposure`. Omitting weights silently inflates dispersion.\n- Outliers in claim size dominate the dispersion fit. The paper notes REML mitigates but does not eliminate this — winsorize extreme claims or model on log scale.\n\n## Code Example\nSee `[[examples/smyth-jorgensen-2002-tweedie-dispersion]]`.\n\n## Domain Pitfalls\n- Variance power `p = (α + 2) / (α + 1)` where α is the gamma shape. Profile `p` from data; do **not** hardcode 1.5 or 1.7 — see [[TweedieVariancePowerEstimation]].\n- Exposure handling: `Y_i = Z_i / w_i` (claim per unit exposure). Pass `weights = w_i` to GLM; modeling raw `Z_i` without weights misallocates dispersion.\n- The benchmark in `archive/auto-insurance-bench-*` hardcodes `var.power = 1.7` with no profiling — this is the first thing to fix.\n\n## Connections\n- [[TweedieDistribution]] — underlying distribution\n- [[DoubleGeneralizedLinearModels]] — modeling framework\n- [[REML]] — variance estimation method\n- [[GeneralizedLinearModels]] — base\n- [[GordonKSmyth]], [[BentJorgensen]]\n\n## Contradictions\nNone with existing wiki content.\n",

    : normalized;
  const intValue = Number.parseInt(value, 16);
  const r = (intValue >> 16) & 255;
  const g = (intValue >> 8) & 255;
  const b = intValue & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function escapeHtml(text) {
  return (text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function stripFrontmatter(markdown) {
  return (markdown || "").replace(/^---\n[\s\S]*?\n---\n?/, "");
}

function renderInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink">[[$1]]</span>');
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return html;
}

function renderMarkdown(markdown) {
  const lines = stripFrontmatter(markdown).split(/\r?\n/);
  const html = [];
  let paragraph = [];
  let listType = null;
  let listItems = [];
  let quoteLines = [];
  let inCodeBlock = false;
  let codeLines = [];

  function flushParagraph() {
    if (!paragraph.length) return;
    html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph = [];
  }

  function flushList() {
    if (!listType || !listItems.length) return;
    const items = listItems.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("");
    html.push(`<${listType}>${items}</${listType}>`);
    listType = null;
    listItems = [];
  }

  function flushQuote() {
    if (!quoteLines.length) return;
    html.push(`<blockquote>${quoteLines.map(line => renderInlineMarkdown(line)).join("<br>")}</blockquote>`);
    quoteLines = [];
  }

  function flushCode() {
    if (!codeLines.length) {
      html.push("<pre><code></code></pre>");
      return;
    }
    html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
    codeLines = [];
  }

  for (const rawLine of lines) {
    const line = rawLine.replace(/\t/g, "    ");
    const trimmed = line.trim();

    if (trimmed.startsWith("```")) {
      flushParagraph();
      flushList();
      flushQuote();
      if (inCodeBlock) {
        flushCode();
        inCodeBlock = false;
      } else {
        inCodeBlock = true;
      }
      continue;
    }

    if (inCodeBlock) {
      codeLines.push(rawLine);
      continue;
    }

    if (!trimmed) {
      flushParagraph();
      flushList();
      flushQuote();
      continue;
    }

    const headingMatch = trimmed.match(/^(#(1, 6))\s+(.+)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      flushQuote();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^(-(3,)|\*(3,))$/.test(trimmed)) {
      flushParagraph();
      flushList();
      flushQuote();
      html.push("<hr>");
      continue;
    }

    const quoteMatch = trimmed.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      quoteLines.push(quoteMatch[1]);
      continue;
    }
    flushQuote();

    const unorderedMatch = trimmed.match(/^[-*]\s+(.+)$/);
    if (unorderedMatch) {
      flushParagraph();
      if (listType && listType !== "ul") flushList();
      listType = "ul";
      listItems.push(unorderedMatch[1]);
      continue;
    }

    const orderedMatch = trimmed.match(/^\d+\.\s+(.+)$/);
    if (orderedMatch) {
      flushParagraph();
      if (listType && listType !== "ol") flushList();
      listType = "ol";
      listItems.push(orderedMatch[1]);
      continue;
    }

    flushList();
    paragraph.push(trimmed);
  }

  if (inCodeBlock) flushCode();
  flushParagraph();
  flushList();
  flushQuote();
  return html.join("");
}

function rebuildAdjacency(filteredEdges) {
  adjacency.clear();
  for (const node of originalNodes) {
    adjacency.set(node.id, new Set());
  }
  for (const edge of filteredEdges) {
    if (!adjacency.has(edge.from)) adjacency.set(edge.from, new Set());
    if (!adjacency.has(edge.to)) adjacency.set(edge.to, new Set());
    adjacency.get(edge.from).add(edge.to);
    adjacency.get(edge.to).add(edge.from);
  }
}

function currentEdgeState() {
  const minConf = parseInt(controls.confSlider.value, 10) / 100;
  controls.confValue.textContent = minConf.toFixed(2);
  return {
    showExtracted: controls.extracted.checked,
    showInferred: controls.inferred.checked,
    showAmbiguous: controls.ambiguous.checked,
    minConf,
  };
}

function passesEdgeFilters(edge, edgeState) {
  const typeOk = (edge.type === "EXTRACTED" && edgeState.showExtracted)
    || (edge.type === "INFERRED" && edgeState.showInferred)
    || (edge.type === "AMBIGUOUS" && edgeState.showAmbiguous);
  const confOk = (edge.confidence ?? 1.0) >= edgeState.minConf;
  return typeOk && confOk;
}

function searchNodes(q) {
  applyFilters(q, activeNodeId);
}

function clearSelection() {
  activeNodeId = null;
  closeDrawer();
  applyFilters(searchInput.value, null);
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
}

function openDrawer(node, relatedIds) {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-title").textContent = node.label;
  const communityText = Number.isInteger(node.group) && node.group >= 0 ? ` · community ${node.group}` : "";
  document.getElementById("drawer-meta").textContent = `${node.type}${communityText}`;
  document.getElementById("drawer-path").textContent = node.path;
  document.getElementById("drawer-preview").textContent = node.preview || "";
  document.getElementById("drawer-markdown").innerHTML = renderMarkdown(node.markdown || "");

  const relatedList = document.getElementById("drawer-related-list");
  relatedList.innerHTML = "";
  const relatedNodes = originalNodes
    .filter(item => relatedIds.has(item.id) && item.id !== node.id)
    .sort((a, b) => a.label.localeCompare(b.label));

  if (relatedNodes.length === 0) {
    const empty = document.createElement("span");
    empty.textContent = "No directly connected nodes";
    relatedList.appendChild(empty);
    return;
  }

  for (const related of relatedNodes) {
    const chip = document.createElement("button");
    chip.className = "related-chip";
    chip.textContent = related.label;
    chip.onclick = () => focusNode(related.id);
    relatedList.appendChild(chip);
  }
}

function applyFilters(query = searchInput.value, selectedNodeId = activeNodeId) {
  const lower = (query || "").trim().toLowerCase();
  const edgeState = currentEdgeState();
  const filteredEdges = originalEdges.filter(edge => passesEdgeFilters(edge, edgeState));
  rebuildAdjacency(filteredEdges);

  const relatedIds = selectedNodeId
    ? new Set([selectedNodeId, ...(adjacency.get(selectedNodeId) || [])])
    : null;
  const filteredNodeIds = new Set();
  for (const edge of filteredEdges) {
    filteredNodeIds.add(edge.from);
    filteredNodeIds.add(edge.to);
  }

  let visibleNodeCount = 0;
  const nodeUpdates = originalNodes.map(node => {
    const matchesSearch = !lower || node.label.toLowerCase().includes(lower);
    const isActive = selectedNodeId === node.id;
    const isConnected = filteredNodeIds.has(node.id);
    const isRelated = !relatedIds || relatedIds.has(node.id);
    const hidden = !selectedNodeId && !lower && !isConnected;
    const emphasized = matchesSearch && isRelated && (isConnected || !!lower || isActive);

    if (!hidden) {
      visibleNodeCount += 1;
    }

    return {
      id: node.id,
      hidden,
      color: {
        background: emphasized ? node.color : hexToRgba(node.color, hidden ? 0.05 : 0.14),
        border: emphasized ? hexToRgba(node.color, 0.96) : hexToRgba(node.color, hidden ? 0.08 : 0.22),
        highlight: { background: node.color, border: hexToRgba(node.color, 1) },
        hover: { background: node.color, border: hexToRgba(node.color, 1) },
      },
      font: {
        color: emphasized ? "#f2f3f8" : hidden ? "rgba(242,243,248,0.08)" : "rgba(242,243,248,0.2)",
      },
      borderWidth: isActive ? 5 : 2,
      size: isActive ? 18 : 12,
    };
  });

  const edgeUpdates = originalEdges.map(edge => {
    const enabled = passesEdgeFilters(edge, edgeState);
    if (!enabled) {
      return { id: edge.id, hidden: true };
    }

    const matchesSearch = !lower
      || nodeMap.get(edge.from)?.label.toLowerCase().includes(lower)
      || nodeMap.get(edge.to)?.label.toLowerCase().includes(lower);
    const isRelated = !relatedIds || relatedIds.has(edge.from) || relatedIds.has(edge.to);
    const touchesActive = !!selectedNodeId && (edge.from === selectedNodeId || edge.to === selectedNodeId);
    const emphasized = matchesSearch && isRelated;

    return {
      id: edge.id,
      hidden: false,
      width: touchesActive ? 2.8 : emphasized ? 1.2 : 0.6,
      color: emphasized ? edge.color : hexToRgba(edge.color, 0.08),
    };
  });

  nodes.update(nodeUpdates);
  edges.update(edgeUpdates);

  if (selectedNodeId) {
    const activeNode = nodeMap.get(selectedNodeId);
    if (activeNode) {
      openDrawer(activeNode, relatedIds || new Set([selectedNodeId]));
    }
  }

  const focusSuffix = selectedNodeId && nodeMap.get(selectedNodeId)
    ? ` · focused: ${nodeMap.get(selectedNodeId).label}`
    : "";
  stats.textContent = `${visibleNodeCount} nodes · ${filteredEdges.length} edges${focusSuffix}`;
}

const container = document.getElementById("graph");

// Adaptive physics based on graph size
const nodeCount = originalNodes.length;
const gravConst = nodeCount > 80 ? -8000 : nodeCount > 30 ? -5000 : -2000;
const springLen = nodeCount > 80 ? 250 : nodeCount > 30 ? 200 : 150;

const network = new vis.Network(container, { nodes, edges }, {
  nodes: {
    shape: "dot",
    font: { color: "#ddd", size: 12, strokeWidth: 3, strokeColor: "#111" },
    borderWidth: 1.5,
    scaling: {
      min: 8,
      max: 40,
      label: { enabled: true, min: 10, max: 20, drawThreshold: 6, maxVisible: 24 },
    },
  },
  edges: {
    width: 0.8,
    smooth: { type: "continuous" },
    arrows: { to: { enabled: true, scaleFactor: 0.4 } },
    color: { inherit: false },
    hoverWidth: 2,
  },
  physics: {
    stabilization: { iterations: 250, updateInterval: 25, fit: true },
    barnesHut: { gravitationalConstant: gravConst, springLength: springLen, springConstant: 0.02, damping: 0.15 },
    minVelocity: 0.75,
  },
  interaction: { hover: true, tooltipDelay: 150, hideEdgesOnDrag: true, hideEdgesOnZoom: true },
});

// Ensure the graph fits the viewport after physics stabilization
network.once("stabilizationIterationsDone", function () {
  network.fit({ animation: { duration: 400, easingFunction: "easeInOutQuad" } });
});

function focusNode(nodeId) {
  activeNodeId = nodeId;
  applyFilters(searchInput.value, nodeId);
  const node = nodeMap.get(nodeId) || nodes.get(nodeId);
  const relatedIds = new Set([nodeId, ...(adjacency.get(nodeId) || [])]);
  openDrawer(node, relatedIds);
  network.focus(nodeId, {
    scale: 1.1,
    animation: { duration: 300, easingFunction: "easeInOutQuad" },
  });
}

network.on("click", params => {
  if (params.nodes.length > 0) {
    focusNode(params.nodes[0]);
  } else {
    clearSelection();
  }
});

applyFilters();
</script>
</body>
</html>
