    "markdown": "# Overview\n\nThis wiki captures the methodological foundation for **auto-insurance pure-premium modeling** using the Tweedie compound-Poisson family. Eight papers, published 2002–2021, cover the path from foundational distributional theory through high-dimensional regularization, nonparametric extensions, and modern Bayesian / mixed-model fitting — together with the canonical evaluation methodology (ordered Gini).\n\n## Modeling spectrum\n\nThe eight sources together form a complete spectrum of how to fit a Tweedie response:\n\n| Model family | Source | R package | When it wins |\n|---|---|---|---|\n| Tweedie GLM (single mean) | [[smyth-jorgensen-2002-tweedie-dispersion]] | `statmod` | Baseline; interpretable; small n |\n| Tweedie DGLM (mean + dispersion) | [[smyth-jorgensen-2002-tweedie-dispersion]] | `dglm` | Inference matters; heteroscedasticity present |\n| Poisson + Gamma (two GLMs) | [[delong-lindholm-wuthrich-2021-tweedie]] | `stats::glm` | Counts and amounts both observed; industry standard; neural-net friendly |\n| Tweedie GAM (smooth nonparametric main effects) | [[wood-2011-gam-reml]] | `mgcv` | Nonlinear main effects; medium n |\n| Grouped elastic net Tweedie GLM | [[qian-2016-hdtweedie]] | `HDtweedie` | High p; categorical groups; polynomial expansions |\n| Boosted Tweedie | [[yang-2016-tdboost]] | `TDboost` | Interactions; large n; predictive ceiling |\n| Bayesian / mixed Tweedie | [[zhang-2013-cplm]] | `cplm` | Hierarchical structure; uncertainty quantification |\n\n## Cross-cutting concerns\n\n- **Variance power `p`** is the single most impactful hyperparameter and should be *estimated*, not hardcoded — see [[TweedieVariancePowerEstimation]]. Most packages either accept `p` (`statmod::tweedie`, `cv.HDtweedie`, `TDboost`) or estimate it automatically (`mgcv::tw`, `cplm::cpglm`). The `tweedie::tweedie.profile` routine is the cross-package fallback for estimation.\n- **Density evaluation** near `p = 1` or `p = 2` is numerically tricky. [[dunn-smyth-2008-tweedie-fourier]] provides the Fourier-inversion machinery used inside `tweedie`; series and inversion methods are complementary across the (p, y, φ) space.\n- **Evaluation** uses the ordered Gini ([[frees-meyers-cummings-2011-gini]], implemented as `cplm::gini`). Always pair with [[CalibrationPlots]] — Gini is rank-only and misses absolute miscalibration. Suspiciously high Gini (> 0.5 on `cplm::AutoClaim`) should trigger a [[LeakageAudit]].\n- **Adverse selection** is the economic reason the Gini index matters: refined scores capture better risks and leave competitors with worse pools ([[AdverseSelection]]).\n- **Parametrization choice** — Poisson-Gamma vs Tweedie EDF — has real consequences for robustness and neural-network extensibility ([[delong-lindholm-wuthrich-2021-tweedie]]), even when the two are mathematically equivalent at the GLM level.\n\n## What this wiki is *not*\n\n- It does not cover modern ML extensions (XGBoost-Tweedie, neural Tweedie heads, deep mixture-of-experts pricing) beyond the 2021 paper's neural-network discussion. Adding those would expand the wiki — currently a gap that lint would surface.\n- It does not cover rate-filing, regulatory, or fairness considerations — see future ingest plan.\n- It does not cover reserving (the IBNR / claims-development side of actuarial work) — the same Tweedie machinery applies but the modeling targets are different.\n",

    "markdown": "---\ntitle: \"Lorenz Curve (Ordered)\"\ntype: concept\ntags: [method, evaluation]\nsources: [frees-meyers-cummings-2011-gini]\nlast_updated: 2026-05-15\n---\n\n## Definition\nA graph of cumulative loss share (y-axis) vs cumulative premium share (x-axis), with both axes ordered by *relativity* = candidate score / base premium. Diagonal (45° line) = \"line of equality\" where each premium dollar collects the same fraction of losses. Curve below the diagonal = candidate score identifies an unprofitable subset; the further below, the more separation. Frees–Meyers–Cummings extend the classical Lorenz curve (from welfare economics, 1905) by sorting on a third variable (relativity) rather than the response itself.\n\n## When to Use\n- Visualizing how well a pricing model separates losses from premiums\n- Communicating model value to non-technical stakeholders — the curve area is intuitive\n- Diagnosing *where* a model fails: a curve that hugs the diagonal at the bottom but dips at top means the model only adds value for high-relativity policies\n\n## When NOT to Use\n- For absolute calibration (predicted ≠ observed mean) — Lorenz is rank-only\n- For binary outcomes — ROC curve is the analog\n- Without context — a Lorenz curve alone doesn't say whether the model is good *enough*; pair with [[GiniIndex]] for a summary number\n\n## Canonical Call\n```R\nlibrary(cplm)\n\nresult <- cplm::gini(loss = y_true, score = y_score, baseline = y_base)\nplot(result)                    # ordered Lorenz curve\n\n# Or, manually:\ndf <- data.frame(loss = y_true, score = y_score, base = y_base)\ndf <- df[order(df$score / df$base), ]\ndf$cum_prem <- cumsum(df$base)  / sum(df$base)\ndf$cum_loss <- cumsum(df$loss) / sum(df$loss)\nplot(df$cum_prem, df$cum_loss, type = \"l\")\nabline(0, 1, lty = 2)\n```\nSee `[[examples/frees-meyers-cummings-2011-gini]]`.\n\n## Key Hyperparameters\nNone — the curve is deterministic given (loss, score, baseline).\n\n## Common Pitfalls\n- **Sorting on `score` directly instead of `score / baseline`** — produces the classical (not ordered) Lorenz curve. The relativity ordering is the whole point.\n- **Equal-weight points vs premium-weight points on the x-axis** — ordered Lorenz uses premium weights (sum of `baseline_i`); a uniform x-axis is the classical curve\n- **Reading the curve without considering the baseline** — a model can look great vs constant baseline and poor vs a slightly better model\n\n## Sources\n- [[frees-meyers-cummings-2011-gini]] — defines the ordered Lorenz curve for insurance\n",

    "markdown": "---\ntitle: \"Generalized Additive Models (GAMs)\"\ntype: concept\ntags: [method, mgcv]\nsources: [wood-2011-gam-reml]\nlast_updated: 2026-05-15\n---\n\n## Definition\nGAMs extend GLMs by allowing some linear terms to be replaced with smooth functions of covariates: `g(μ_i) = β_0 + Σ_j f_j(x_ij)`. Smooths `f_j` are represented as penalized regression splines; smoothness is selected automatically via REML, GCV, or related criteria. Implemented in R as `mgcv` ([[SimonNWood]]). The 2011 paper introduces the first stable full-Newton method for direct whole-model smoothness selection.\n\n## When to Use\n- When the relationship between a continuous predictor and the response is plausibly nonlinear (age, vehicle value, geography)\n- Drop-in successor to GLM when you suspect non-monotonic or non-log-linear effects\n- For spatial smoothing — `s(longitude, latitude)` tensor smooths beat ZIP-code dummy coding\n- For interpretable nonlinearity — partial-effect plots are the natural output\n\n## When NOT to Use\n- When interactions among many predictors dominate — boosting wins (see [[GradientTreeBoosting]])\n- When most predictors are categorical — GAM degenerates to GLM\n- For very large n with very high-dimensional categorical predictors — `mgcv::bam` is the scalable alternative\n\n## Canonical Call\n```R\nlibrary(mgcv)\n\nfit <- gam(\n  CLM_AMT ~ s(AGE, k = 10) + s(BLUEBOOK, k = 10) + s(INCOME, k = 10) + AREA,\n  data    = train,\n  family  = tw(),                                 # tw() estimates Tweedie p\n  method  = \"REML\",                                # never GCV.Cp — see paper\n  select  = TRUE                                   # variable selection via shrinkage\n)\n\ny_hat <- predict(fit, newdata = test, type = \"response\")\ngam.check(fit)                                     # diagnostic — k-index, residuals\nplot(fit, pages = 1)                               # smooth-function plots\n```\nSee `[[examples/wood-2011-gam-reml]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `method` | smoothness selection | `\"GCV.Cp\"` | **`\"REML\"`** for stability |\n| `k` (per smooth) | basis dimension | 10 | start at 10; raise if `gam.check` k-index < 1 |\n| `bs` (per smooth) | basis type | `\"tp\"` thin-plate | `\"tp\"` or `\"cr\"`; `\"cs\"` for shrinkage-enabled |\n| `select` | shrinkage for variable selection | FALSE | TRUE if you want effective variable selection |\n| `family` | distribution + link | gaussian | `tw()` (Tweedie, p estimated) for claims |\n| `gamma` (penalty multiplier) | smoothness bias | 1 | 1.4 to encourage smoother fits |\n\n## Common Pitfalls\n- **`method = \"GCV.Cp\"` (the legacy default) can silently fail to converge** — the paper exists specifically because of this. Always pass `method = \"REML\"`.\n- **Factors inside `s(...)`** — `s(AREA)` errors; factors enter directly as `+ AREA` or via `s(continuous, by = factor)` for varying-coefficient\n- **`k` too small** — smooth is stuck near low DF. Diagnose via `gam.check(fit)`; raise `k` if needed\n- **`Tweedie(p)` (capital T) vs `tw()` (lowercase)** — first requires fixed `p`, second estimates it. For most claim work, use `tw()`\n- **Concurvity** (smooth analog of collinearity) — `concurvity(fit)` will surface; reduce by dropping or combining smooths\n\n## Sources\n- [[wood-2011-gam-reml]] — defines the direct full-Newton smoothness selection method used in modern `mgcv`\n",

    "id": "concepts/FrequencySeverityDecomposition",
    "label": "Frequency-Severity Decomposition",
    "type": "concept",
    "color": "#8BC34A",
    "path": "knowledge/wiki/concepts/FrequencySeverityDecomposition.md",
    "markdown": "---\ntitle: \"Frequency-Severity Decomposition\"\ntype: concept\ntags: [domain, actuarial]\nsources: [delong-lindholm-wuthrich-2021-tweedie, smyth-jorgensen-2002-tweedie-dispersion]\nlast_updated: 2026-05-15\n---\n\n## Definition\nThe actuarial convention of decomposing total claim losses into two independently-modeled components: *frequency* (how often claims occur, typically Poisson) and *severity* (how large claims are when they occur, typically gamma). Pure premium = frequency × severity. The decomposition exposes that some risk factors (e.g., MVR points) act primarily on frequency while others (e.g., vehicle book value) act primarily on severity — information lost in a single Tweedie GLM.\n\n## Why It Matters in Practice\n- Standard industry parametrization for auto, home, and many specialty lines\n- Diagnostically valuable: a single bad coefficient is easier to detect when modeled separately. In a Tweedie GLM, frequency- and severity-driven changes are intertwined.\n- Required when claim counts AND individual claim amounts are both observed\n- Recommended in [[delong-lindholm-wuthrich-2021-tweedie]] over Tweedie DGLM when the goal is robust, interpretable pricing — especially for neural-network extensions where Tweedie loss has known optimization instabilities\n\n## How to Handle in Code\n```R\n# Frequency: Poisson with exposure offset\nfit_freq <- glm(N ~ AGE + AREA + MVR_PTS + offset(log(EXPOSURE)),\n                data = train, family = poisson(link = \"log\"))\n\n# Severity: conditional on N > 0, weighted by N\nfit_sev <- glm(CLM_AMT_PER_CLAIM ~ AGE + AREA + BLUEBOOK,\n               data = subset(train, N > 0),\n               family = Gamma(link = \"log\"),\n               weights = N)\n\n# Pure premium for prediction\npp <- predict(fit_freq, test, type = \"response\") *\n      predict(fit_sev,  test, type = \"response\")\n```\nSee `[[examples/delong-lindholm-wuthrich-2021-tweedie]]` for the full pipeline.\n\n## Common Mistakes\n- **Computing severity on raw CLM_AMT instead of CLM_AMT / N** — fits the *total* claim loss conditional on having any, which is a different (and less interpretable) thing\n- **Forgetting `weights = N` in severity** — high-frequency policies become silently underweighted\n- **Including zero-claim rows in severity** — gamma is undefined at zero; subset to `N > 0` first\n- **Different covariate sets for frequency vs severity that don't match the business logic** — the decomposition's value is showing where they differ; consistent covariates mask that\n- **Adding instead of multiplying for pure premium** — common slip; the two predictions combine multiplicatively\n\n## Sources\n- [[delong-lindholm-wuthrich-2021-tweedie]] — argues for Poisson-Gamma over Tweedie DGLM\n- [[smyth-jorgensen-2002-tweedie-dispersion]] — describes when Tweedie DGLM substitutes\n",

    "type": "concept",
    "color": "#FF5722",
    "path": "knowledge/wiki/concepts/GeneralizedLinearModels.md",
    "markdown": "---\ntitle: \"Generalized Linear Models (GLMs)\"\ntype: concept\ntags: [method, statmod]\nsources: [smyth-jorgensen-2002-tweedie-dispersion, delong-lindholm-wuthrich-2021-tweedie]\nlast_updated: 2026-05-15\n---\n\n## Definition\nA regression framework for response distributions in the exponential dispersion family. The mean `μ_i = E[y_i]` is linked to a linear predictor via `g(μ_i) = x_i^T β`. The variance is structured as `Var(y_i) = φ · V(μ_i)` where `V(·)` is the variance function characterizing the distribution. For Tweedie, `V(μ) = μ^p`.\n\n## When to Use\n- Baseline model for almost any pricing exercise; interpretable, fast, well-understood\n- When the linear-on-link-scale assumption is plausible after standard transforms (log income, log vehicle value)\n- Required by regulators in many jurisdictions for \"explainable\" auto/home/health rate filings\n\n## When NOT to Use\n- When nonlinear effects or interactions are substantial — use [[GeneralizedAdditiveModels]] (smooth effects) or [[GradientTreeBoosting]] (full nonlinearity)\n- When the number of correlated predictors is large — regularization is essential; see [[GroupedElasticNet]]\n- When random effects are needed — see [[GeneralizedLinearMixedModels]]\n\n## Canonical Call\n```R\nfit <- glm(formula = CLM_AMT ~ AGE + BLUEBOOK + INCOME + AREA,\n           data    = train,\n           family  = tweedie(var.power = 1.5, link.power = 0))   # for Tweedie\n# Or family = poisson(link=\"log\") for frequency, Gamma(link=\"log\") for severity\n\ny_hat <- predict(fit, newdata = test, type = \"response\")\n```\nSee `[[examples/smyth-jorgensen-2002-tweedie-dispersion]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `family` | distribution + link | gaussian | `tweedie(var.power, link.power=0)` for total claim; `poisson` / `Gamma` for split |\n| `weights` | observation weights | 1 | exposure (for Poisson) or claim count (for severity) |\n| `offset` | known shift on link scale | 0 | `log(exposure)` for Poisson frequency |\n| `na.action` | NA handling | `na.omit` | be deliberate — `na.exclude` preserves row alignment for predict |\n\n## Common Pitfalls\n- **`predict.glm(..., type = \"link\")` vs `\"response\"`** — link returns the linear predictor, response returns the mean. For pricing, you almost always want `\"response\"`.\n- **Unseen factor levels in test data** — `glm` silently produces NA or errors. Always pre-process factors to align levels: `test$AREA <- factor(test$AREA, levels = levels(train$AREA))`.\n- **Hardcoded `var.power`** — for Tweedie family, profiling matters (see [[TweedieVariancePowerEstimation]])\n- **Aliased coefficients from collinear predictors** — `glm` silently drops; check `summary(fit)$aliased`\n- **No regularization** — when p > n/10, the GLM overfits; use [[GroupedElasticNet]] or shrinkage in [[GeneralizedAdditiveModels]] with `select = TRUE`\n\n## Sources\n- [[smyth-jorgensen-2002-tweedie-dispersion]] — uses GLM as base\n- [[delong-lindholm-wuthrich-2021-tweedie]] — Poisson and gamma GLMs as the standard alternative\n",

    "markdown": "---\ntitle: \"Adverse Selection\"\ntype: concept\ntags: [domain, actuarial]\nsources: [frees-meyers-cummings-2011-gini, yang-2016-tdboost, delong-lindholm-wuthrich-2021-tweedie]\nlast_updated: 2026-05-15\n---\n\n## Definition\nThe condition where, under asymmetric information, low-risk insureds withdraw from an insurer that charges above their expected loss while high-risk insureds stay, dragging the portfolio toward the latter. In pricing terms: if a competitor adopts a more refined risk-segmentation score and you don't, your good risks switch to them — leaving you with the bad risks and inadequate premium to cover them.\n\n## Why It Matters in Practice\n- Adverse selection is the *economic* reason that the ordered Gini index ([[GiniIndex]]) exists. Twice the area between the curves quantifies how much profit you leave on the table by not refining your score.\n- Whichever model has the *highest* Gini against a constant baseline is hardest to attack via adverse selection. The \"minimax\" Gini strategy ([[frees-meyers-cummings-2011-gini]] Section 3.3) picks the score least vulnerable across all competitor scenarios.\n- Tweedie GLM's linear structure can be too rigid to capture genuine non-monotonic risk (e.g., age) — which means competitors using GAM/boosting can extract the good young drivers. This is the core motivation for [[yang-2016-tdboost]].\n\n## How to Handle in Code\n- Evaluate every candidate model with `cplm::gini(loss, score, baseline)` against (a) a constant baseline and (b) every competing model\n- Tabulate the Gini matrix; pick the model with the smallest maximum Gini-against-it (paper's \"minimax\" rule)\n- For deployment: monitor the realized loss ratio by score band over time. If high-score policies' loss ratio drifts up while low-score drifts down, that's adverse-selection in action\n- Don't conflate adverse selection with calibration error — they require different fixes\n\n## Common Mistakes\n- **Treating adverse selection as a modeling-accuracy problem alone** — it's a *relative* problem (you vs competitors). Even an accurate model leaks profit if your competitor is *more* accurate.\n- **Optimizing only Gini-against-constant** — this maximizes profitability in isolation. The minimax framing accounts for competitor sophistication.\n- **Ignoring downstream policy-retention impact** — adverse selection manifests in renewal patterns; the modeling team should partner with the retention team to close the loop.\n\n## Sources\n- [[frees-meyers-cummings-2011-gini]] — formal connection to ordered Gini\n- [[yang-2016-tdboost]] — argues nonparametric models reduce adverse-selection exposure\n- [[delong-lindholm-wuthrich-2021-tweedie]] — motivates parametrization choice in terms of practical robustness\n",

    "id": "concepts/TweedieDistribution",
    "label": "Tweedie Distribution",
    "type": "concept",
    "color": "#8BC34A",
    "path": "knowledge/wiki/concepts/TweedieDistribution.md",
    "markdown": "---\ntitle: \"Tweedie Distribution\"\ntype: concept\ntags: [method, distribution]\nsources: [smyth-jorgensen-2002-tweedie-dispersion, dunn-smyth-2008-tweedie-fourier, qian-2016-hdtweedie, yang-2016-tdboost, zhang-2013-cplm, delong-lindholm-wuthrich-2021-tweedie]\nlast_updated: 2026-05-15\n---\n\n## Definition\nThe Tweedie family is the subset of exponential dispersion models with power mean–variance relationship `Var(Y) = φ · μ^p`. For `1 < p < 2`, the distribution is a compound Poisson–gamma: a point mass at zero (probability `exp(-μ^(2-p)/(φ(2-p)))`) combined with a continuous gamma-like density on the positive reals. This makes it the canonical distribution for insurance claim amounts: most policies have zero claims, the rest have right-skewed positive losses.\n\n## When to Use\n- Modeling a non-negative continuous outcome with exact zeros (claim amounts, rainfall, biomass, expense)\n- When zero-inflation is a *feature of the data-generating process*, not measurement censoring\n- When fitting separate frequency + severity models is overkill or impossible (e.g., only aggregate total is recorded — see [[smyth-jorgensen-2002-tweedie-dispersion]])\n\n## When NOT to Use\n- When claim counts AND individual claim sizes are both available — fitting Poisson + Gamma separately is usually more interpretable and more robust ([[delong-lindholm-wuthrich-2021-tweedie]]); also see [[FrequencySeverityDecomposition]]\n- For neural-network regression — Tweedie loss is hard to optimize near `p` boundaries; Poisson + gamma networks are more stable\n- For `p` outside (1, 2) you're at a boundary case (Poisson, gamma, inverse Gaussian, normal) — use that distribution directly\n\n## Canonical Call\n```R\nlibrary(statmod)        # for use as a GLM family\nglm(y ~ ., data = train,\n    family = tweedie(var.power = 1.5, link.power = 0))   # link.power=0 means log\n\nlibrary(tweedie)        # for density evaluation\ndtweedie(y, mu = 1, phi = 1, power = 1.5)\n```\nVerified end-to-end: `[[examples/smyth-jorgensen-2002-tweedie-dispersion]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `p` (var.power) | shape of mean-variance | 1.5 | **estimate from data** via `tweedie.profile` — do not hardcode |\n| `phi` | dispersion | estimated | estimated; for DGLM, modeled as a function of covariates |\n| `link.power` | link function | 0 (log) | 0 |\n\n## Common Pitfalls\n- **Hardcoding `p = 1.5` or `p = 1.7`.** Standard industry shortcut, but `p` has material impact on standard errors and Gini SEs. See [[TweedieVariancePowerEstimation]].\n- **Filtering zero-claim rows.** Tweedie absorbs zeros — filtering destroys the signal it exists to model. The mean-variance relationship is calibrated on the *full* distribution including zeros.\n- **Density near `p = 1` or `p = 2`** is numerically unstable. Either method (series or Fourier inversion — see [[dunn-smyth-2008-tweedie-fourier]]) struggles at the boundaries. Stay in (1.05, 1.95).\n- **`var.power` vs `power` vs `alpha`** — argument name varies by package (`statmod` uses `var.power`, `tweedie` uses `power`, `TDboost` uses `alpha` in a distribution list). Same parameter, three names.\n\n## Sources\n- [[smyth-jorgensen-2002-tweedie-dispersion]] — defining application to insurance claims with dispersion modeling\n- [[dunn-smyth-2008-tweedie-fourier]] — numerical density evaluation\n- [[qian-2016-hdtweedie]] — high-dim regularized estimation\n- [[yang-2016-tdboost]] — boosted nonparametric fitting\n- [[zhang-2013-cplm]] — mixed-model and Bayesian extensions\n- [[delong-lindholm-wuthrich-2021-tweedie]] — comparison with Poisson-Gamma parametrization\n",

    "id": "concepts/GroupedElasticNet",
    "label": "Grouped Elastic Net (for Tweedie)",
    "type": "concept",
    "color": "#E91E63",
    "path": "knowledge/wiki/concepts/GroupedElasticNet.md",
    "markdown": "---\ntitle: \"Grouped Elastic Net (for Tweedie)\"\ntype: concept\ntags: [method, HDtweedie, regularization]\nsources: [qian-2016-hdtweedie]\nlast_updated: 2026-05-15\n---\n\n## Definition\nA penalized GLM where coefficients are partitioned into pre-specified *groups* (typically: one group per categorical variable's dummies, or per variable's polynomial expansion) and a combined L2/L1 penalty is imposed group-wise. The L1 part forces entire groups to zero (variable selection at the group level); the L2 part smooths within selected groups and stabilizes when within-group predictors are correlated. For Tweedie response, the IRLS-BMD algorithm of [[qian-2016-hdtweedie]] solves the path efficiently.\n\n## When to Use\n- When predictors include categorical variables with many levels — group all dummies for one factor together so the variable is selected as a whole\n- When polynomial or basis expansions are used — group all terms for one base variable\n- When the number of predictors approaches or exceeds n — regularization is mandatory\n- As a fast and well-calibrated alternative to forward/backward selection\n\n## When NOT to Use\n- When predictors are uncorrelated and few — plain GLM is simpler and equivalent\n- When interactions among many predictors dominate the signal — boosting wins\n- When grouping structure is unclear or arbitrary — the method's benefit comes from meaningful groups\n\n## Canonical Call\n```R\nlibrary(HDtweedie)\n\n# Pre-condition: x is a numeric matrix (no intercept column, factors dummified)\ncv_fit <- cv.HDtweedie(\n  x      = x_train,\n  y      = y_train,\n  group  = group_vec,      # one entry per column; same int = same group\n  p      = 1.5,\n  alpha  = 0.7,            # 1 = pure grouped lasso, 0 = grouped ridge\n  nfolds = 5\n)\n\ny_hat <- predict(cv_fit, newx = x_test, s = \"lambda.min\", type = \"response\")\n```\nSee `[[examples/qian-2016-hdtweedie]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `group` | grouping vector | none — required | one block per categorical factor; per base variable for polynomials |\n| `alpha` (τ) | L1/L2 mix, (0, 1] | 1 | 0.5–0.7 when within-group correlation is high |\n| `p` | Tweedie variance power | 1.5 | profile from data |\n| `pf` | per-group penalty weight | `sqrt(group_size)` | leave default for balanced groups; adaptive weights for unbalanced |\n| `nfolds` | CV folds | 5 | 5–10 |\n\n## Common Pitfalls\n- **`group_vec <- 1:n_cols`** (each column its own group) collapses the method to ordinary elastic net — defeats the purpose. This is the bug in `archive/auto-insurance-bench-*/procedures/03_grplasso.R`.\n- **Including the intercept column in x** — `cv.HDtweedie` adds it internally; including it in `x` produces wrong group sizes and an unpenalized but doubly-counted intercept\n- **Factor columns in x** — not accepted; pre-dummify with `model.matrix(~ . - 1)` then build `group`\n- **Omitting `s = \"lambda.min\"` in predict** — returns a matrix of predictions across all lambdas; silently breaks downstream\n- **Unbalanced group sizes** — default `sqrt(p_j)` only partially corrects; very unbalanced (10×+) groups need adaptive weights\n\n## Sources\n- [[qian-2016-hdtweedie]] — defines the algorithm and `HDtweedie` R package\n",

    "id": "concepts/CalibrationPlots",
    "label": "Calibration Plots (Decile Lift, Double Lift)",
    "type": "diagnostic",
    "color": "#00BCD4",
    "path": "knowledge/wiki/concepts/CalibrationPlots.md",
    "markdown": "---\ntitle: \"Calibration Plots (Decile Lift, Double Lift)\"\ntype: diagnostic\ntags: [evaluation]\nsources: [frees-meyers-cummings-2011-gini]\nlast_updated: 2026-05-15\n---\n\n## What It Checks\nWhether the model's *absolute* predictions match observed losses, segment by segment. Gini ([[GiniIndex]]) measures ranking quality but cannot detect systematic bias — a model that doubles every prediction has the same Gini but is unusable for pricing. Calibration plots catch that class of failure.\n\n## Procedure\n1. **Decile lift plot** — sort policies by predicted loss; split into 10 equal-count bins. Plot mean predicted vs mean observed per bin. Good calibration = both lines coincide.\n2. **Double lift plot** — between two competing models A and B, sort by `pred_A / pred_B`; bin into deciles; plot the ratio of observed loss in each decile to model A's prediction vs model B's prediction. Surfaces *where* one model wins or loses.\n3. **Calibration slope** — regress observed on predicted (linear); slope = 1 and intercept = 0 = perfectly calibrated. Slope < 1 = model over-discriminates (predicted spread > observed spread).\n4. **Mean prediction check** — overall predicted mean must equal observed mean within sampling error; otherwise dispersion modeling is mis-fit.\n\n```R\nlibrary(ggplot2)\ndf <- data.frame(pred = y_hat, obs = y_true)\ndf$decile <- cut(df$pred, breaks = quantile(df$pred, probs = 0:10/10),\n                 include.lowest = TRUE, labels = 1:10)\nagg <- aggregate(cbind(pred, obs) ~ decile, data = df, FUN = mean)\nggplot(agg, aes(x = as.integer(decile))) +\n  geom_line(aes(y = pred), color = \"blue\") +\n  geom_line(aes(y = obs),  color = \"red\") +\n  labs(x = \"Predicted decile\", y = \"Mean loss\",\n       title = \"Decile lift (blue = predicted, red = observed)\")\n```\n\n## Pass / Fail Thresholds\n- **Decile means must lie within ±10% of each other** across the full range. Mismatches > 20% in any decile = redesign feature set.\n- **Calibration slope** in `[0.9, 1.1]` is acceptable; outside that, model is mis-calibrated. Most boosted models need post-hoc calibration (isotonic regression on holdout).\n- **Mean prediction / mean observed** should be in `[0.95, 1.05]` on holdout. If off by more, dispersion is wrong; check the variance power and exposure handling.\n\n## When to Run\n- **Always**, after computing Gini. Gini alone is insufficient.\n- Before reporting any cross-model comparison — a high-Gini-but-miscalibrated model is *worse* in practice than a low-Gini-but-calibrated model\n- During monitoring after deployment — calibration drift is the first symptom of distribution shift\n",
    "preview": "## What It Checks Whether the model's *absolute* predictions match observed losses, segment by segment. Gini ([[GiniIndex]]) measures ranking quality but cannot detect systematic bias — a model that doubles every predict",

    "id": "concepts/GiniIndex",
    "label": "Gini Index (Ordered, for Insurance)",
    "type": "concept",
    "color": "#00BCD4",
    "path": "knowledge/wiki/concepts/GiniIndex.md",
    "markdown": "---\ntitle: \"Gini Index (Ordered, for Insurance)\"\ntype: concept\ntags: [method, cplm, evaluation]\nsources: [frees-meyers-cummings-2011-gini]\nlast_updated: 2026-05-15\n---\n\n## Definition\nFor insurance model evaluation, the *ordered* Gini index is twice the area between the ordered Lorenz curve and the 45° line. Policies are sorted by *relativity* (candidate score divided by base premium), and the Lorenz curve plots cumulative loss share vs cumulative premium share along that order. The Gini quantifies how much loss separation a candidate score achieves over a base premium — approximately twice the average expected profit from adopting the score (Frees–Meyers–Cummings 2011).\n\n## When to Use\n- Comparing pricing models when total-loss prediction accuracy is the goal\n- When the loss distribution is heavily zero-inflated and skewed (MSE/MAE are dominated by tails)\n- For regulator-facing model justification — Gini is widely accepted in actuarial contexts\n- Pairing with calibration checks ([[CalibrationPlots]]) — Gini is rank-only, not calibration-aware\n\n## When NOT to Use\n- Alone — Gini doesn't catch miscalibration. A constant model has Gini ≈ 0 but useless predictions; a perfectly ranked but uncalibrated model has high Gini but wrong absolute predictions\n- For pure binary classification — use AUC, KS, or precision-recall instead\n- For very small n (< 1000) — asymptotic SE is unreliable; bootstrap\n\n## Canonical Call\n```R\nlibrary(cplm)\n\nresult <- cplm::gini(\n  loss     = y_true,            # observed losses\n  score    = y_score,           # candidate model prediction\n  baseline = y_base             # reference (e.g., constant or older model)\n)\n\nresult$gini       # the index in percent (0–100 scale)\nresult$se         # asymptotic standard error\nplot(result)      # ordered Lorenz curve\n```\nSee `[[examples/frees-meyers-cummings-2011-gini]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `baseline` | reference premium | — | constant (e.g., `rep(mean(loss), n)`) for first pass; competing model for comparative pass |\n| sort order | by relativity = score / baseline | ascending | ascending |\n\nThe metric has no tuning hyperparameters — it's deterministic given inputs.\n\n## Common Pitfalls\n- **`gini(y_true, y_pred)` (the benchmark scripts' wrapper)** — the wrapper passes `baseline = rep(constant, n)` implicitly. Valid, but document it. If you intended to compare against a competing model, you need to pass that as `baseline`.\n- **Different sort handling for ties** — for very discrete predictions, break ties deliberately before passing\n- **Comparing Gini across datasets** — Gini depends on the loss distribution; cross-dataset comparison is misleading\n- **Gini > 0.6 on AutoClaim** — published reasonable range for Tweedie/penalized methods is 0.30–0.45; values above 0.6 should trigger a [[LeakageAudit]]. The `medium-01` benchmark hit 0.69 — almost certainly a data-prep bug, not real performance\n- **Treating Gini as a hypothesis test** — use the asymptotic SE: differences within 2 SEs are not significant\n\n## Sources\n- [[frees-meyers-cummings-2011-gini]] — defines the ordered Gini for insurance pricing\n",
    "preview": "## Definition For insurance model evaluation, the *ordered* Gini index is twice the area between the ordered Lorenz curve and the 45° line. Policies are sorted by *relativity* (candidate score divided by base premium), a",

    "id": "concepts/DoubleGeneralizedLinearModels",
    "label": "Double Generalized Linear Models (DGLM)",
    "type": "concept",
    "color": "#8BC34A",
    "path": "knowledge/wiki/concepts/DoubleGeneralizedLinearModels.md",
    "markdown": "---\ntitle: \"Double Generalized Linear Models (DGLM)\"\ntype: concept\ntags: [method, dglm]\nsources: [smyth-jorgensen-2002-tweedie-dispersion, delong-lindholm-wuthrich-2021-tweedie]\nlast_updated: 2026-05-15\n---\n\n## Definition\nA two-sub-GLM framework that jointly models the *mean* and the *dispersion* of a response distribution. The mean GLM has the usual form `g(μ_i) = x_i^T β`; the dispersion is modeled by a second GLM `g_d(φ_i) = z_i^T γ` on the unit deviances (which are approximately gamma-distributed). The two sub-GLMs are fitted iteratively. For Tweedie, this captures the fact that different covariates often drive expected loss vs loss volatility — which constant-dispersion GLM misses.\n\n## When to Use\n- When dispersion is plausibly non-constant — e.g., teenage drivers have both higher *expected* loss and higher *variance* of loss\n- When inference (standard errors, hypothesis tests) matters, not just point predictions\n- When [[TweedieDistribution]] is the response and the goal is industry-grade tariff precision\n- As an alternative to fitting separate frequency and severity GLMs when only aggregate cost is available\n\n## When NOT to Use\n- When n is small (< 5000) — the dispersion submodel needs enough deviances to fit stably\n- When the goal is purely point prediction and dispersion structure is irrelevant\n- When neural networks are the modeling tool — Tweedie DGLM doesn't translate cleanly; [[delong-lindholm-wuthrich-2021-tweedie]] argues for Poisson + Gamma networks instead\n\n## Canonical Call\n```R\nlibrary(dglm)\nlibrary(statmod)\n\nfit_dglm <- dglm(\n  formula  = CLM_AMT ~ AGE + BLUEBOOK + AREA + MVR_PTS,\n  dformula = ~ AGE + AREA,                       # dispersion sub-model\n  family   = tweedie(var.power = 1.5, link.power = 0),\n  data     = train,\n  method   = \"reml\"                              # REML-adjusted; ML biased for n_params ~ n\n)\n\n# Predict mean\ny_hat   <- predict(fit_dglm, newdata = test, type = \"response\")\n# Predict dispersion\nphi_hat <- predict(fit_dglm$dispersion.fit, newdata = test, type = \"response\")\n```\nSee `[[examples/smyth-jorgensen-2002-tweedie-dispersion]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `dformula` | dispersion covariates | `~1` (constant) | start with main effects; add interactions if SE matters |\n| `method` | estimation criterion | `\"ml\"` | `\"reml\"` (paper) |\n| `family` | response distribution | gaussian | `tweedie(var.power, link.power=0)` |\n\n## Common Pitfalls\n- **Constant dispersion (`dformula = ~1`)** silently produces results equivalent to a plain GLM — defeats the purpose\n- **ML instead of REML** when the number of mean-model parameters grows with n — REML mitigates the bias; the paper exists partly because of this\n- **Dispersion submodel with too many covariates** — over-fits when count of deviances per dispersion parameter is small; start sparse\n- **Interpreting dispersion-submodel coefficients as economic effects** — they are statistical noise descriptors, not premium-relevant per se. Pricing decisions still come from the mean submodel.\n\n## Sources\n- [[smyth-jorgensen-2002-tweedie-dispersion]] — defining application\n- [[delong-lindholm-wuthrich-2021-tweedie]] — comparison vs Poisson-Gamma; computational improvements\n",

    "id": "concepts/AutoClaimDataset",
    "label": "AutoClaim Dataset (cplm::AutoClaim)",
    "type": "concept",
    "color": "#E91E63",
    "path": "knowledge/wiki/concepts/AutoClaimDataset.md",
    "markdown": "---\ntitle: \"AutoClaim Dataset (cplm::AutoClaim)\"\ntype: concept\ntags: [domain, actuarial, reference]\nsources: [zhang-2013-cplm, yang-2016-tdboost]\nlast_updated: 2026-05-15\n---\n\n## Definition\nThe canonical benchmark dataset for Tweedie/insurance regression in R, shipped as `cplm::AutoClaim`. From Yip and Yau (2005), originally an auto insurance claim panel with 10,296 policy-year records and 29 variables. The conventional filter for \"new customers only\" (`IN_YY == 1`) yields 2,812 rows; this is what every benchmark in `archive/auto-insurance-bench-*` uses.\n\n## Why It Matters in Practice\n- Reproducibility — every paper benchmarking Tweedie methods on real data uses this or a sibling dataset. Comparisons are otherwise apples-to-oranges.\n- It is *small* — 2,812 rows × 28 features. High-dimensional methods like [[GroupedElasticNet]] are not really stressed.\n- Heavily zero-inflated — most policies have CLM_AMT = 0. Makes it a good Tweedie testbed but a *bad* test for absolute-calibration metrics.\n- Published Gini on this filtered version is in the 0.30–0.45 range across well-tuned Tweedie/penalized methods. Values >0.5 are implausible and should trigger a [[LeakageAudit]].\n\n## How to Handle in Code\n```R\nlibrary(cplm)\ndata(\"AutoClaim\", package = \"cplm\")\n\n# Standard filter\nnew_customers <- AutoClaim[AutoClaim$IN_YY == 1, ]   # 2812 rows\nstr(new_customers)\n\n# Response and main features\n# CLM_AMT       : total claim amount (Tweedie response)\n# CLM_FREQ5     : count of claims in past 5 years\n# EXPOSURE      : not in cplm version directly; some derived datasets add it\n# AGE, BLUEBOOK, INCOME, MVR_PTS, KIDSDRIV, HOMEKIDS, NPOLICY, TRAVTIME : numeric\n# AREA (Urban/Rural), GENDER, MARRIED, JOBCLASS, etc. : categorical\n\n# Recommended transforms (used in the benchmarks)\ndf <- new_customers\ndf$BLUEBOOK_LOG <- log(df$BLUEBOOK)\ndf$INCOME_LOG   <- log(df$INCOME + 10)                # +10 because INCOME contains 0s\n\n# Scaling (fit on train, apply to test)\nscale_cols <- c(\"AGE\", \"BLUEBOOK_LOG\", \"INCOME_LOG\", \"TRAVTIME\")\n```\n\n## Common Mistakes\n- **Using all 10,296 rows when prior literature uses the `IN_YY == 1` filter** — your Gini is then not comparable to published results\n- **Scaling test set with test-set statistics** — biases evaluation; fit scaling on train, apply to test\n- **Treating `AREA` (or similar categoricals) as numeric** — silent bug; always coerce to factor explicitly\n- **Forgetting `log(INCOME + c)` for the zero rows** — `log(0) = -Inf`; the `+10` adjustment is the conventional choice in this dataset's literature\n- **Filtering zero-claim rows before fitting Tweedie** — defeats the entire purpose; Tweedie absorbs zeros (see [[TweedieDistribution]])\n\n## Sources\n- [[zhang-2013-cplm]] — the `cplm` R package that ships this dataset\n- [[yang-2016-tdboost]] — example application in Section 6\n",

    "id": "concepts/PoissonGamma",
    "label": "Poisson-Gamma Compound Model",
    "type": "concept",
    "color": "#8BC34A",
    "path": "knowledge/wiki/concepts/PoissonGamma.md",
    "markdown": "---\ntitle: \"Poisson-Gamma Compound Model\"\ntype: concept\ntags: [method, distribution]\nsources: [delong-lindholm-wuthrich-2021-tweedie, smyth-jorgensen-2002-tweedie-dispersion]\nlast_updated: 2026-05-15\n---\n\n## Definition\nA two-stage model for aggregated insurance losses: claim *count* `N ~ Poisson(λw)` with exposure `w`, and individual claim *sizes* `Z_j ~ Gamma(γ, c)` i.i.d. The total loss `S = Σ Z_j` is then compound Poisson–gamma distributed. Mathematically equivalent (in distribution) to the [[TweedieDistribution]] with `1 < p < 2`, but parametrized differently — frequency `λ` and severity `c/γ` are kept separate.\n\n## When to Use\n- Industry-standard parametrization for auto/home insurance pricing\n- When claim *counts* AND individual claim *sizes* are observed (two GLMs to fit, more information used)\n- When you need separate frequency and severity diagnostics — different covariates often affect them differently (e.g., a young driver may have higher *frequency* but similar *severity* as an older driver)\n- For neural-network extensions ([[delong-lindholm-wuthrich-2021-tweedie]]) — two networks train more stably than a single Tweedie-loss network\n\n## When NOT to Use\n- Only the aggregate loss `S` is recorded (not `N`) — use Tweedie EDF / DGLM ([[smyth-jorgensen-2002-tweedie-dispersion]])\n- When you need a single end-to-end model for downstream pipelines that consume one prediction\n\n## Canonical Call\n```R\n# Frequency\nfit_freq <- glm(N ~ AGE + AREA + offset(log(EXPOSURE)),\n                data = train, family = poisson(link = \"log\"))\n\n# Severity (conditional on N > 0; response = avg claim per claim; weight by N)\nfit_sev <- glm(CLM_AMT_PER_CLAIM ~ AGE + AREA,\n               data = subset(train, N > 0),\n               family = Gamma(link = \"log\"),\n               weights = N)\n\n# Pure premium\npp <- predict(fit_freq, newdata = test, type = \"response\") *\n      predict(fit_sev,  newdata = test, type = \"response\")\n```\nVerified end-to-end: `[[examples/delong-lindholm-wuthrich-2021-tweedie]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| frequency link | for Poisson GLM | log | log |\n| severity link | for gamma GLM | inverse | **log** (matches Tweedie equivalence theorem) |\n| `offset(log(exposure))` | frequency exposure | required | required |\n| `weights = N` | severity weighting | required | required (when y is per-claim average) |\n\n## Common Pitfalls\n- **Forgetting `weights = N` in the severity model** — large-N policies are then underweighted; predictions bias low for high-frequency segments\n- **Including zero-claim rows in the severity GLM** — the gamma likelihood is undefined at zero; subset with `N > 0` first\n- **Different covariate transforms for frequency vs severity** — fine in practice, but breaks the algebraic identity with Tweedie DGLM\n- **Combining via sum instead of product** — pure premium = frequency × severity (per unit exposure), not frequency + severity\n\n## Sources\n- [[delong-lindholm-wuthrich-2021-tweedie]] — argues industry preference for this parametrization, esp. for neural networks\n- [[smyth-jorgensen-2002-tweedie-dispersion]] — describes when Tweedie DGLM substitutes for Poisson-Gamma\n",

    "markdown": "---\ntitle: \"Gradient Tree-Boosting (for Tweedie)\"\ntype: concept\ntags: [method, TDboost, boosting]\nsources: [yang-2016-tdboost]\nlast_updated: 2026-05-15\n---\n\n## Definition\nA forward-stagewise ensemble method: each iteration fits a small regression tree to the negative gradient of the loss with respect to the current prediction, then adds it (scaled by a shrinkage factor) to the running estimate. For Tweedie pricing, the loss is the Tweedie negative log-likelihood (Yang–Qian–Zou 2016; implemented as the `TDboost` R package). Captures nonlinearities and interactions without specifying them in advance.\n\n## When to Use\n- When you suspect substantial interactions among predictors (age × vehicle value, region × driver record) that linear or additive models miss\n- When n is large enough (≥10k typical) to support nonparametric flexibility\n- As a \"benchmark\" or upper-bound model — if a tuned GLM/GAM can match boosted accuracy, it's preferred for interpretability\n\n## When NOT to Use\n- When the dataset is small (a few thousand rows) and signal is weak — GAM or regularized GLM often wins\n- When monotonicity is required (e.g., MVR points → premium must be monotone) — boosting needs explicit constraints or post-processing\n- When regulator demands a fully interpretable rate structure — partial dependence is interpretable but not \"transparent\" in the GLM sense\n\n## Canonical Call\n```R\nlibrary(TDboost)\n\nfit <- TDboost(\n  formula      = CLM_AMT ~ AGE + BLUEBOOK + MVR_PTS + INCOME + AREA + ...,\n  data         = train,\n  distribution = list(name = \"EDM\", alpha = 1.5),    # alpha = variance power\n  n.trees      = 3000,\n  interaction.depth = 3,\n  shrinkage    = 0.005,\n  bag.fraction = 0.5,\n  cv.folds     = 5\n)\n\nbest_iter <- TDboost.perf(fit, method = \"cv\", plot.it = FALSE)\ny_hat     <- predict(fit, newdata = test, n.trees = best_iter, type = \"response\")\n```\nSee `[[examples/yang-2016-tdboost]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended |\n|---|---|---|---|\n| `distribution$alpha` | Tweedie variance power | 1.5 | profile from data |\n| `n.trees` | max boosting rounds | 100 | 3000+ with shrinkage 0.005; pick via CV |\n| `shrinkage` (ν) | learning rate | 0.001 | 0.005 |\n| `interaction.depth` (L) | tree depth (1 = stumps) | 1 | 3–5 for meaningful interactions |\n| `bag.fraction` | row subsample | 0.5 | 0.5 |\n| `cv.folds` | CV for picking n.trees | 0 (off) | 5 |\n\n## Common Pitfalls\n- **Predicting at `n.trees = fit$n.trees`** instead of the CV-selected best_iter — overfits silently; predictions look fine but generalize poorly\n- **`distribution$alpha` overloaded name** — it's the Tweedie variance power, not the learning rate, not the elastic net mixing\n- **No monotone constraint support out of the box** — for regulator-facing rates, post-process or use a constrained boosting package\n- **Unseen factor levels** — TDboost predicts the marginal mean for new levels; not always desired\n- **Variable importance via `relative.influence`** is on the *raw* importance scale; for comparison across models, normalize\n\n## Sources\n- [[yang-2016-tdboost]] — defines the algorithm and the `TDboost` R package\n",

    "markdown": "---\ntitle: \"Leakage Audit (for Insurance Claim Models)\"\ntype: diagnostic\ntags: [evaluation]\nsources: [frees-meyers-cummings-2011-gini]\nlast_updated: 2026-05-15\n---\n\n## What It Checks\nWhether the predicted-vs-observed performance reflects genuine model quality rather than information leakage from target into features, or test-set contamination from train-set transforms. Specifically catches the failure mode where Gini on `cplm::AutoClaim` jumps from ~0.35 (expected, published range) to ~0.69 (implausible).\n\n## Procedure\n1. **Sanity-baseline Gini** — fit an intercept-only model; its Gini on holdout should be ≈ 0 (≤ 0.02). If higher, sort order is leaking — check that test indices weren't used in train preprocessing.\n2. **Held-out feature ranges** — for every numeric feature, verify `range(test)` ⊆ `range(train) ± 5%`. If a test value is far outside train range, scaling fit on train and applied to test will produce extrapolation that looks like signal.\n3. **Mean-prediction check** — `mean(y_hat_test) / mean(y_true_test)` should be in `[0.95, 1.05]`. Sharply different means indicate that the response-derived feature leaked, or that the test rows were unintentionally filtered.\n4. **Permutation sanity test** — randomly permute the test response; recompute Gini. Should drop to ≈ 0. If the \"Gini\" with shuffled labels is high, the score is correlated with row order, not with the response.\n5. **Cross-run consistency** — refit on a different seed/split; Gini should stay within ±0.03 of the original. Stability outside that range = the model is over-fitting on split-specific noise OR there is a global preprocessing leak.\n\n```R\n# Sanity-baseline Gini against constant\nconstant_pred <- rep(mean(y_train), length(y_test))\ncplm::gini(y_test, constant_pred, baseline = constant_pred)$gini  # ≈ 0\n\n# Permutation\nset.seed(42)\ny_perm <- sample(y_test)\ncplm::gini(y_perm, y_hat_test, baseline = constant_pred)$gini    # ≈ 0\n```\n\n## Pass / Fail Thresholds\n- **Gini ≤ 0.5 on `cplm::AutoClaim`** is the rough plausibility ceiling for current published methods on this dataset. Anything > 0.55 → run the audit.\n- **Intercept-only Gini** must be ≤ 0.02. Higher means sort order is informative — leakage.\n- **Cross-seed Gini SD** > 0.05 = unstable; investigate split-dependent preprocessing.\n- **Mean-prediction ratio** outside `[0.95, 1.05]` = miscalibration OR leakage; both warrant investigation.\n\n## When to Run\n- **Before reporting any unusually high Gini.** This is exactly the situation in `archive/benchmark_plan_qwen3.5-35b-a3b-medium-01` where GrpLasso/GrpNet/TDboost all returned ~0.69 vs the high-01 run's ~0.35 across the same dataset.\n- After any preprocessing pipeline change\n- Before any production deployment — catches the silent class of bugs that pass code review but break in practice\n",

    "markdown": "---\ntitle: \"Tweedie Variance Power Estimation\"\ntype: concept\ntags: [domain, actuarial, method]\nsources: [dunn-smyth-2008-tweedie-fourier, zhang-2013-cplm, smyth-jorgensen-2002-tweedie-dispersion]\nlast_updated: 2026-05-15\n---\n\n## Definition\nThe variance power `p` in the Tweedie family controls the shape of the mean-variance relationship `Var(Y) = φ · μ^p`, where `1 < p < 2` corresponds to compound Poisson-gamma. Industry practice frequently hardcodes `p = 1.5` or `p = 1.7`; this is a shortcut, not a principled choice. The variance power has substantial impact on dispersion estimates, standard errors, and Gini SEs ([[zhang-2013-cplm]]).\n\n## Why It Matters in Practice\n- Wrong `p` gives wrong dispersion, which gives wrong standard errors, which gives wrong \"is this coefficient significant\" calls\n- Hardcoded `p = 1.7` (the default in `archive/auto-insurance-bench-*`) is one of three credible explanations for the cross-run Gini variance between the benchmarks\n- Different lines of business have different `p`: auto claims typically 1.4–1.6, homeowners 1.5–1.7, weather-related lines 1.6–1.8\n- Once estimated on a stable book, `p` rarely needs to be re-estimated more than annually\n\n## How to Handle in Code\n```R\nlibrary(tweedie)\nlibrary(statmod)\n\n# Profile likelihood over a grid of p\nprof <- tweedie.profile(\n  formula  = CLM_AMT ~ AGE + BLUEBOOK + INCOME + MVR_PTS + AREA,\n  data     = train,\n  p.vec    = seq(1.1, 1.9, by = 0.1),\n  link.power = 0,                                # log link\n  method   = \"inversion\",                         # safest for AutoClaim ranges\n  do.plot  = TRUE\n)\np_hat <- prof$p.max                               # MLE\nci    <- prof$ci                                  # 95% CI\n\n# Refine with finer grid near the optimum\nprof2 <- tweedie.profile(..., p.vec = seq(p_hat - 0.1, p_hat + 0.1, by = 0.02))\n\n# Use the result in downstream models\nfit <- glm(CLM_AMT ~ ., data = train,\n           family = tweedie(var.power = prof2$p.max, link.power = 0))\n```\nSee `[[examples/dunn-smyth-2008-tweedie-fourier]]`.\n\nFor mixed models, `cplm::cpglm()` / `cplm::cpglmm()` estimate `p` by default (Laplace or AGQ).\n\nFor GAM, `family = tw()` (lowercase) inside `mgcv::gam()` estimates `p` automatically.\n\n## Common Mistakes\n- **Hardcoding `p`** — never do this on a new dataset without first profiling. The benchmark scripts in `archive/auto-insurance-bench-*` hardcode `p = 1.7` across all models, which suppresses one axis of meaningful comparison.\n- **Profiling on tiny grids** — `p.vec = seq(1, 2, by = 0.5)` misses the optimum; use 0.05–0.1 spacing and refine\n- **Trusting the smoothed maximum on a flat profile** — when the data has little signal, the profile is flat and the maximum is dominated by smoothing artifacts. Check `do.smooth = FALSE` for the raw profile\n- **Reusing `p` across portfolios** — auto-only `p` may not transfer to a multi-line book; re-profile when the loss distribution shifts\n\n## Sources\n- [[dunn-smyth-2008-tweedie-fourier]] — numerical method behind `tweedie.profile`\n- [[zhang-2013-cplm]] — impact of `p` on inference; `cplm` estimates it\n- [[smyth-jorgensen-2002-tweedie-dispersion]] — discusses orthogonality of `p` to `μ`\n",

    "id": "sources/zhang-2013-cplm",
    "label": "Likelihood-based and Bayesian Methods for Tweedie Compound Poisson Linear Mixed Models",

    "markdown": "---\ntitle: \"Likelihood-based and Bayesian Methods for Tweedie Compound Poisson Linear Mixed Models\"\ntype: source\ntags: [method, cplm, tweedie, mixed-models, bayesian]\ndate: 2013-01-01\nsource_file: knowledge/raw/papers/zhang-2013-cplm.md\n---\n\n## Summary\nZhang derives four likelihood-based and Bayesian estimation methods for Tweedie compound-Poisson linear mixed models (CPLMM): Laplace approximation, adaptive Gauss–Hermite quadrature (AGQ), Monte Carlo EM (MCEM), and MCMC. Unlike penalized quasi-likelihood (PQL), all of these enable estimation of the variance power `p` from the data — which the paper shows has large impact on dispersion estimates and downstream uncertainty. Implemented as the R package `cplm`, which also ships the `AutoClaim` dataset used in every benchmark in `archive/`.\n\n## Canonical API\n```R\nlibrary(cplm)\n\n# Fixed-effects-only Tweedie GLM (estimates p)\nfit_glm <- cpglm(\n  formula = CLM_AMT ~ AGE + BLUEBOOK + INCOME + MVR_PTS + AREA,\n  data    = train,\n  link    = \"log\"\n  # p is estimated by default; pass p = 1.5 to fix\n)\n\n# Mixed model — random intercept by some grouping factor\nfit_mm <- cpglmm(\n  formula  = CLM_AMT ~ AGE + BLUEBOOK + (1 | AREA),\n  data     = train,\n  link     = \"log\",\n  optimizer = \"nlminb\"\n)\n\n# Bayesian — MCMC\nfit_bayes <- bcplm(\n  formula  = CLM_AMT ~ AGE + BLUEBOOK + (1 | AREA),\n  data     = train,\n  n.chains = 3,\n  n.iter   = 10000,\n  n.burnin = 2000\n)\n\n# Gini evaluation\ncplm::gini(loss = test$CLM_AMT,\n           score = predict(fit_glm, newdata = test, type = \"response\"),\n           baseline = mean(train$CLM_AMT))\n```\n\nEnd-to-end: `[[examples/zhang-2013-cplm]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `link` | link function | `\"log\"` | `\"log\"` for claims | `\"log\"`, `\"identity\"` (rare) |\n| `p` (`var.power`) | variance power | estimated | estimate; if fixing, profile first | (1.05, 1.95) |\n| `optimizer` (in `cpglmm`) | mixed-model fit | `\"nlminb\"` | `\"nlminb\"` or `\"bobyqa\"` | both |\n| `nAGQ` (in `cpglmm`) | quadrature points | 1 (= Laplace) | 5–10 for better accuracy at cost of time | 1, 5, 10 |\n| `n.iter` (in `bcplm`) | MCMC iterations | 1000 | 10000+ for stable inference | 5000–50000 |\n| `n.chains` | MCMC chains | 1 | 3+ for convergence diagnostics | 3, 4 |\n\n## Argument Quirks\n- **`cpglm` estimates `p` by default** unless you pass `p` explicitly. `p.cpglm = NULL` triggers the profile.\n- The `cplm` family of fitters use `formula` notation with `(1 | group)` for random effects — same as `lme4`. Don't confuse with `nlme`'s `random = ~ 1 | group`.\n- `cpglm` returns S4; access slots with `@`, not `$`. Coefficients via `coef(fit)`, fitted values via `fitted(fit)`.\n- The `AutoClaim` dataset has `IN_YY` indicator for \"new customer\" — the benchmarks filter to `IN_YY == 1` (2,812 rows). Using all rows is also valid but changes the population.\n- `bcplm` priors are mildly informative by default; check `summary(fit_bayes)` Rhat and effective sample size before trusting results.\n\n## Failure Modes\n- **PQL is the silent failure mode this paper exists to fix.** If you fit a Tweedie mixed model and `p` is hardcoded, you have a PQL-equivalent model with all its bias. Always at least *profile* `p`.\n- MCEM is computationally expensive; for n > 100k consider Laplace + nAGQ instead.\n- Bayesian: poor MCMC mixing manifests as Rhat > 1.05 — increase iterations or reparameterize.\n- AGQ with `nAGQ > 1` fails when random effects are crossed (only nested allowed).\n\n## Code Example\nSee `[[examples/zhang-2013-cplm]]`.\n\n## Domain Pitfalls\n- `cplm::AutoClaim` is the canonical insurance benchmark. 2,812 rows × 28 features (filtered `IN_YY == 1`) is small — high-dimensional methods like HDtweedie are not really stressed here.\n- Estimating `p` matters: the paper shows that hardcoding `p = 1.5` vs `p = 1.7` shifts dispersion estimates by ~30% on real data, with downstream consequences for standard errors and Gini SEs.\n- The `cplm::gini()` interface is the reference implementation of [[frees-meyers-cummings-2011-gini]]'s metric — use it instead of rolling your own.\n\n## Connections\n- [[TweedieDistribution]] — distribution\n- [[GeneralizedLinearMixedModels]] — model class\n- [[LaplaceApproximation]] — estimation\n- [[AdaptiveGaussHermiteQuadrature]] — estimation\n- [[MonteCarloEM]] — estimation\n- [[MarkovChainMonteCarlo]] — Bayesian\n- [[AutoClaimDataset]] — canonical data\n- [[YanweiZhang]]\n\n## Contradictions\nNone with existing wiki content.\n",

    "id": "sources/dunn-smyth-2008-tweedie-fourier",
    "label": "Evaluation of Tweedie Exponential Dispersion Model Densities by Fourier Inversion",
    "type": "source",
    "color": "#8BC34A",
    "path": "knowledge/wiki/sources/dunn-smyth-2008-tweedie-fourier.md",
    "markdown": "---\ntitle: \"Evaluation of Tweedie Exponential Dispersion Model Densities by Fourier Inversion\"\ntype: source\ntags: [method, tweedie, numerical, density]\ndate: 2008-08-17\nsource_file: knowledge/raw/papers/dunn-smyth-2008-tweedie-fourier.md\n---\n\n## Summary\nDunn and Smyth provide a numerically reliable Fourier-inversion routine for evaluating Tweedie densities, which have no closed form for general `p ∉ {0, 1, 2, 3}`. The method uses Sidi's modified W-transformation to accelerate the highly oscillatory integral, combined with a rescaling identity that lets all evaluations be done at `y = µ = 1`. Complementary to the series-evaluation method (Dunn–Smyth 2005): each works best in different regions of `(p, y, φ)`. Together they cover the full parameter space to 10⁻¹⁰ accuracy. This is what powers `dtweedie()` in the `tweedie` R package.\n\n## Canonical API\n```R\nlibrary(tweedie)\n\n# Density evaluation\nd <- dtweedie(y = c(0, 1, 2.5),\n              mu = 1.0,\n              phi = 1.0,\n              power = 1.5)        # power = p, in (1, 2)\n\n# Profile likelihood for the variance power p — the canonical way to set p\nprof <- tweedie.profile(\n  formula  = CLM_AMT ~ AGE + BLUEBOOK + AREA,\n  data     = train,\n  p.vec    = seq(1.2, 1.8, by = 0.1),\n  do.plot  = TRUE,\n  link.power = 0,\n  method   = \"inversion\"          # Fourier-inversion; alt: \"series\", \"saddlepoint\", \"interpolation\"\n)\np_hat <- prof$p.max                # ML estimate of p\n```\n\nEnd-to-end: `[[examples/dunn-smyth-2008-tweedie-fourier]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `power` (p) | variance power | none | profile via `tweedie.profile` | (1, 2) for compound Poisson |\n| `method` | density evaluation | `\"interpolation\"` | `\"inversion\"` for large y / p near 2; `\"series\"` for small y | both — check agreement |\n| `p.vec` | grid for `tweedie.profile` | 1.2, 1.3, ..., 1.8 | finer near optimum | 0.05 spacing |\n| `link.power` | link function | 0 = log | 0 | 0 |\n\n## Argument Quirks\n- **`dtweedie(y, mu, phi, power)` — argument order matters; `power` is the variance index, not a link power.** Confusingly, `tweedie()` family in `statmod` uses `var.power` for the same thing.\n- `method = \"series\"` fails when `y` is large or `phi` is small (terms in the infinite sum blow up before convergence). `method = \"inversion\"` is the safe fallback. The paper shows neither alone is universally accurate.\n- `tweedie.profile` is slow — each value of `p` requires a full GLM fit. Use coarse grid first, then refine.\n- `do.smooth = TRUE` (default) fits a quadratic to the profile; useful, but if the grid is too coarse the smoothed max is unreliable.\n\n## Failure Modes\n- **Density evaluation breaks near `p = 1` and `p = 2`** (boundary cases). Approach 1.05–1.95 if you need to be safe; outside that, you're at the boundary case (Poisson or Gamma) and should use those directly.\n- Subtractive cancellation in `method = \"series\"` for `p` close to 2 — symptom: density returns negative or NA.\n- `tweedie.profile` can return a flat profile if the data has no signal — interpret the maximum cautiously.\n\n## Code Example\nSee `[[examples/dunn-smyth-2008-tweedie-fourier]]`.\n\n## Domain Pitfalls\n- Industry practice often hardcodes `p = 1.5` or `p = 1.7`. The Dunn–Smyth machinery is **the** principled way to estimate `p` from your data, and it usually matters: in the benchmark `archive/auto-insurance-bench-*` the hardcoded `p = 1.7` is one of three candidate explanations for the cross-run Gini variance.\n- The paper's accuracy targets (10⁻¹⁰) far exceed what's needed for downstream GLM fitting (relative likelihood differences of 10⁻⁴ are inconsequential). Use `method = \"interpolation\"` for routine work; `\"inversion\"` only when other methods fail.\n\n## Connections\n- [[TweedieDistribution]] — what is being evaluated\n- [[FourierInversion]] — algorithmic technique\n- [[ProfileLikelihood]] — estimation of `p`\n- [[TweedieVariancePowerEstimation]] — domain procedure\n- [[PeterKDunn]], [[GordonKSmyth]]\n\n## Contradictions\nNone with existing wiki content. (The earlier wiki claimed contradiction with [[smyth-jorgensen-2002-tweedie-dispersion]] — that was an LLM hallucination; the two papers are complementary, not contradictory.)\n",

    "markdown": "---\ntitle: \"Making Tweedie's Compound Poisson Model More Accessible\"\ntype: source\ntags: [method, tweedie, dglm, neural-network, insurance]\ndate: 2021-02-13\nsource_file: knowledge/raw/papers/delong-lindholm-wuthrich-2021-tweedie.md\n---\n\n## Summary\nDelong, Lindholm, and Wüthrich revisit the choice between two equivalent parametrizations of the compound Poisson–gamma model: the *Poisson–Gamma* (two separate GLMs for frequency and severity) and the *Tweedie EDF* (one DGLM). Industry typically prefers Poisson–Gamma; the paper derives conditions under which the two give identical predictions, presents a new theorem that cuts computational cost of Tweedie's DGLM, and through GLM + neural-network examples shows that Poisson–Gamma is easier to calibrate and more robust — especially when extending to neural networks.\n\n## Canonical API\n```R\n# ===== Approach A: Poisson-Gamma (two separate GLMs) =====\nlibrary(statmod)\n\n# 1) Frequency (Poisson on claim counts, exposure offset)\nfit_freq <- glm(\n  N ~ AGE + BLUEBOOK + AREA + offset(log(EXPOSURE)),\n  data   = train,\n  family = poisson(link = \"log\")\n)\n\n# 2) Severity (gamma on average claim size, conditional on N > 0)\nfit_sev <- glm(\n  CLM_AMT_PER_CLAIM ~ AGE + BLUEBOOK + AREA,\n  data   = subset(train, N > 0),\n  family = Gamma(link = \"log\"),\n  weights = N                                   # # of claims as weight\n)\n\n# Pure premium prediction\npred_pp <- predict(fit_freq, newdata = test, type = \"response\") *\n           predict(fit_sev,  newdata = test, type = \"response\")\n\n# ===== Approach B: Tweedie DGLM (single model) =====\n# See [[smyth-jorgensen-2002-tweedie-dispersion]] for dglm() example\n```\n\nEnd-to-end: `[[examples/delong-lindholm-wuthrich-2021-tweedie]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| parametrization | Poisson-Gamma vs Tweedie DGLM | — | **Poisson-Gamma** for robustness, esp. with NNs | both — compare |\n| frequency link | for Poisson GLM | log | log | log |\n| severity link | for gamma GLM | inverse | **log** (matches Tweedie identity result) | log |\n| `offset(log(exposure))` | exposure for Poisson | required | required | — |\n| `weights = N` | for severity GLM | required (when y is per-claim) | required | — |\n\n## Argument Quirks\n- The paper's main theorem (Theorem 3.6/3.8): Poisson–Gamma with log links on both parts is *identical in distribution* to Tweedie DGLM under a specific covariate-space alignment. In practice, this rarely holds exactly because covariates are pre-processed differently for frequency and severity — which is fine and often desirable.\n- Severity GLM **must condition on `N > 0`**. Including zero-claim rows breaks the gamma likelihood.\n- Severity response is *average* claim size = `CLM_AMT / N`. Weight by `N` so the GLM treats it as a weighted observation.\n- For neural network extensions: the paper's evidence is that fitting two separate networks (one for frequency, one for severity) is more stable than fitting a single Tweedie-loss network, because Tweedie's loss surface is harder.\n\n## Failure Modes\n- Poisson–Gamma: if you forget `weights = N` in the severity model, large-N policies are underweighted and predictions bias low for high-frequency segments.\n- Tweedie DGLM: dispersion submodel is unstable when claim counts are very low (most data) — the unit deviances become noisy.\n- Identity theorem fails silently if covariate transforms differ between frequency and severity (e.g., log-transform applied to one but not the other).\n\n## Code Example\nSee `[[examples/delong-lindholm-wuthrich-2021-tweedie]]`.\n\n## Domain Pitfalls\n- The benchmark `archive/auto-insurance-bench-*` uses Tweedie-only models. This paper argues that running Poisson–Gamma alongside is the industry baseline — and worth including as a 6th model in the comparison.\n- \"Adverse selection\" framing (also in [[frees-meyers-cummings-2011-gini]]) is the economic reason any of this matters.\n- Neural network extensions: if you go beyond GLM, the paper strongly recommends Poisson + gamma networks over a single Tweedie-loss network. Tweedie loss with neural networks has known training instability around the boundary cases of `p`.\n\n## Connections\n- [[PoissonGamma]] — alternative parametrization\n- [[TweedieDistribution]] — distribution\n- [[DoubleGeneralizedLinearModels]] — DGLM approach\n- [[NeuralNetworks]] — discussed extension\n- [[FrequencySeverityDecomposition]] — domain framing\n- [[LukaszDelong]], [[MathiasLindholm]], [[MarioVWuthrich]]\n\n## Contradictions\nNone with existing wiki content. (The earlier wiki claimed \"contradicts previous claims about traditional GLM superiority\" — that was an LLM hallucination; this paper is descriptive comparison, not a claim of superiority.)\n",

    "id": "sources/qian-2016-hdtweedie",

    "markdown": "---\ntitle: \"Tweedie's Compound Poisson Model With Grouped Elastic Net\"\ntype: source\ntags: [method, HDtweedie, tweedie, regularization, insurance]\ndate: 2016-05-01\nsource_file: knowledge/raw/papers/qian-2016-hdtweedie.md\n---\n\n## Summary\nQian, Yang, and Zou propose a grouped elastic net penalty for Tweedie GLMs and implement it in the R package `HDtweedie`. The algorithm is a two-layer loop: an outer Iteratively Reweighted Least Squares (IRLS) wrapping an inner Blockwise Majorization Descent (BMD). Integrates the \"strong rule\" for path speedup. Designed for high-dimensional insurance pricing where many correlated predictors and dummy-coded categoricals are present.\n\n## Canonical API\n```R\nlibrary(HDtweedie)\n\n# x: numeric design matrix (NO intercept column, NO factor columns — pre-expand)\n# group: integer vector of length ncol(x), giving group index per column\n# y: nonnegative response (claim amount, exposure-adjusted)\ncv_fit <- cv.HDtweedie(\n  x      = x_train,\n  y      = y_train,\n  group  = group_vec,\n  p      = 1.5,        # Tweedie variance power, in (1, 2)\n  alpha  = 0.7,        # mixing: 1 = grouped lasso, 0 = grouped ridge\n  weights = NULL,      # default 1/n per obs; pass exposures if needed\n  nfolds = 5\n)\n\n# Prediction REQUIRES the s= argument — see Argument Quirks\ny_hat <- predict(cv_fit, newx = x_test, s = \"lambda.min\", type = \"response\")\n\n# Active set\nbeta_hat <- coef(cv_fit, s = \"lambda.min\")\nn_active <- sum(beta_hat != 0) - 1   # exclude intercept\n```\n\nSee `[[examples/qian-2016-hdtweedie]]` for the full pipeline against `cplm::AutoClaim`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `p` | Tweedie variance power | 1.5 | profile via `tweedie.profile`; never hardcode | {1.3, 1.5, 1.7} |\n| `alpha` (τ in paper) | L1/L2 mix, `0 < α ≤ 1` | 1 (pure grouped lasso) | 0.5–0.7 when predictors are correlated | {0.5, 0.7, 1.0} |\n| `group` | grouping vector | none — required | one block per categorical (all dummies together); polynomial terms grouped per base variable | — |\n| `nfolds` | CV folds | 5 | 5–10 | 5, 10 |\n| `weights` (v_i) | obs weights | `1/n` | exposure-proportional in actuarial use | — |\n| `pf` (paper's w_j) | group penalty weights | `sqrt(p_j)` | leave default unless adaptive weighting | — |\n\n## Argument Quirks\n- **`x` must be a numeric matrix with no intercept column.** `cv.HDtweedie` adds the intercept internally. Passing `model.matrix(~ .)` directly will include an unpenalized intercept column that breaks groups.\n- **Factor columns are not accepted.** Convert to dummies first (`model.matrix(~ . - 1)`), then build `group` to keep all dummies of one factor in the same block.\n- **`predict.cv.HDtweedie` silently returns a matrix of all-lambda predictions when `s` is omitted.** Always pass `s = \"lambda.min\"` (or `\"lambda.1se\"`). The benchmark scripts in `archive/auto-insurance-bench-*` get this right, but it is a common slip.\n- `type = \"response\"` returns predictions on the original (mean) scale. `type = \"link\"` returns the linear predictor.\n- Strong rule activates by default; turn off with `strong = FALSE` only for debugging.\n\n## Failure Modes\n- **Silent crash** when test set contains factor levels unseen in train — caller must drop or re-bucket them before forming the dummy matrix.\n- Convergence failure when p is too close to 1 or 2 — keep p in (1.05, 1.95).\n- Cross-validation can be unstable when claim distribution is very sparse (>95% zeros); use larger `nfolds` or stratified folds in that case.\n- Group sizes that vary by 10× or more bias selection. Default penalty weight `sqrt(p_j)` partially corrects; adaptive weights help more.\n\n## Code Example\nSee `[[examples/qian-2016-hdtweedie]]`.\n\n## Domain Pitfalls\n- **Group construction is the single most common error.** For a categorical with K levels, group ALL K-1 dummies into one block. For a polynomial expansion (e.g., AGE, AGE², AGE³), group all three terms.\n- Polynomial expansion: scale the base variable first, then expand. Expanding raw years and then scaling breaks the orthogonality that the optimizer assumes.\n- Exposure: pass via `weights`; never include `offset(log(exposure))` (the package does not parse offsets in formulas — it takes a matrix).\n- The benchmark scripts use `group_vec <- 1:n_cols` (each column its own group) which **collapses the method to ordinary elastic net** — a separate issue worth fixing in `archive/auto-insurance-bench-*`.\n\n## Connections\n- [[GroupedElasticNet]] — core method\n- [[IRLS-BMD]] — algorithm\n- [[TweedieDistribution]] — distribution\n- [[StrongRule]] — speedup\n- [[WeiQian]], [[YiYang]], [[HuiZou]]\n\n## Contradictions\nNone with existing wiki content.\n",

    "id": "sources/wood-2011-gam-reml",

    "markdown": "---\ntitle: \"Fast Stable Restricted Maximum Likelihood and Marginal Likelihood Estimation of Semiparametric Generalized Linear Models\"\ntype: source\ntags: [method, mgcv, gam, smoothing, REML]\ndate: 2011-01-01\nsource_file: knowledge/raw/papers/wood-2011-gam-reml.md\n---\n\n## Summary\nWood develops the first computationally stable, full-Newton method for *direct* GAM smoothness selection. Previous schemes (Performance Oriented Iteration, PQL) iteratively re-select smoothing parameters on working linear models and routinely fail to converge — especially with binary data or concurvity. The new method optimizes the whole-model criterion (REML, ML, GCV, or generalized AIC) with exact first and second derivatives. Implemented in `mgcv` as `method = \"REML\"`.\n\n## Canonical API\n```R\nlibrary(mgcv)\n\nfit <- gam(\n  formula = CLM_AMT ~ s(AGE, k = 10) + s(BLUEBOOK, k = 10) +\n                      s(INCOME, k = 10) + s(MVR_PTS, k = 5) +\n                      AREA,                       # factors enter directly\n  data    = train,\n  family  = Tweedie(p = 1.5, link = \"log\"),       # NOTE: capital-T Tweedie, mgcv's family\n  method  = \"REML\",                                # use REML, not GCV.Cp\n  select  = TRUE                                   # variable selection via shrinkage\n)\n\ny_hat <- predict(fit, newdata = test, type = \"response\")\nsummary(fit)         # smooth-term significance via approximate p-values\nplot(fit, pages = 1) # smooth function visualizations\n```\n\nEnd-to-end: `[[examples/wood-2011-gam-reml]]`.\n\n## Key Hyperparameters\n| Name | Role | Default | Paper-recommended | Sensible grid |\n|---|---|---|---|---|\n| `method` | smoothness selection criterion | `\"GCV.Cp\"` (legacy) | **`\"REML\"`** for stability | `\"REML\"`, `\"ML\"`, `\"GCV.Cp\"` |\n| `k` (per smooth) | basis dimension | 10 | start at 10; check via `gam.check` | 5, 10, 20 |\n| `bs` (per smooth) | spline basis type | `\"tp\"` (thin plate) | `\"tp\"` or `\"cr\"` (cubic regression) | `\"tp\"`, `\"cr\"`, `\"cs\"` |\n| `p` (Tweedie family) | variance power | 1.5 | estimate via `family = tw()` (estimates p automatically) | use `tw()` if uncertain |\n| `select` | variable selection via shrinkage | FALSE | TRUE for many smooth terms | TRUE |\n| `gamma` (penalty multiplier) | overfitting guard | 1 | 1.4 to bias toward smoother fits | {1, 1.4} |\n\n## Argument Quirks\n- **`Tweedie(p, link)` (capital T) is `mgcv`'s family** and requires a fixed `p`. **`tw()` (lowercase)** estimates `p` from the data — usually what you want.\n- `s(x, k = 10)` — `k` is the *maximum* basis dimension; the effective DF is shrunk by REML toward an interior optimum. After fitting, run `gam.check(fit)` — if k-index ≪ 1, raise `k`.\n- Factors **do not go inside `s(...)`** — they enter the formula directly. `s(AREA, by = MARITAL)` is a *varying-coefficient* construct, not a way to smooth a categorical.\n- `method = \"GCV.Cp\"` is the *legacy* default. Paper's whole point: this can silently fail. Always pass `method = \"REML\"` (or `\"ML\"`).\n- `predict.gam(..., type = \"response\")` returns mean-scale predictions; `\"link\"` returns the linear predictor.\n\n## Failure Modes\n- **Convergence cycle** (P-IRLS oscillates) — historically common with binary data; the REML/full-Newton method addresses this directly. If it still cycles, increase `gam.control(maxit = 200)`.\n- **`k` too small** — model underfits, smooths are stuck at low DF. Run `gam.check(fit)` and look at `k-index`.\n- **Concurvity** — when smooth terms are nearly collinear functions of other smooth terms. Detect with `concurvity(fit)`; remedy by dropping or combining terms.\n- For Tweedie, `family = tw()` can be sensitive to extreme zeros — large datasets with >95% zeros may need increased `epsilon` in `gam.control`.\n\n## Code Example\nSee `[[examples/wood-2011-gam-reml]]`.\n\n## Domain Pitfalls\n- GAM with `tw()` is the closest drop-in to \"Tweedie GLM with nonlinear effects.\" Often beats both the linear GLM and tree-boosted Tweedie when n is moderate and signal is smooth.\n- The benchmark `archive/auto-insurance-bench-*/procedures/02_tweedie_gam.R` uses `method = \"REML\"` (good) but hardcodes `p = 1.7` instead of using `tw()` (room to improve).\n- `s(longitude, latitude)` (tensor smooth) is the natural way to encode geographic factors that would otherwise be dummy-coded ZIP/region.\n\n## Connections\n- [[GeneralizedAdditiveModels]] — model class\n- [[REML]] — estimation criterion\n- [[PenalizedRegressionSplines]] — smooth representation\n- [[Concurvity]] — diagnostic\n- [[SimonNWood]]\n\n## Contradictions\nNone with existing wiki content.\n",
